## scst-store.tanzu.vmware.com: Tanzu Supply Chain Security Tools - Store
api_host: "localhost"
api_port: 9443
app_service_type: "NodePort"
auth_proxy_host: "0.0.0.0"
auth_proxy_port: 84442
db_host: "metadata-postgres"
db_name: "metadata-store"
db_password:
db_port: "5432"
db_sslmode: "verify-full"
db_user: "metadata-store-user"
storageClassName: "manual"
use_cert_manager: "true"

