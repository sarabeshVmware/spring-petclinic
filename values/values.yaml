## accelerator.apps.tanzu.vmware.com: Application Accelerator for VMware Tanzu
server:
  service_type: "LoadBalancer"
  watched_namespace: "default"
  engine_invocation_url: "http://acc-engine.accelerator-system.svc.cluster.local/invocations"
engine:
  service_type: "ClusterIP"

## api-portal.tanzu.vmware.com: API portal
apiPortalServer:
  replicaCount: 1
  sourceUrls: "https://petstore.swagger.io/v2/swagger.json,https://petstore3.swagger.io/api/v3/openapi.json"
  sourceUrlsCacheTtlSec: "300"
  sourceUrlsTimeoutSec: "10"

## appliveview.tanzu.vmware.com: Application Live View for VMware Tanzu
connector_namespaces: [default]
server_namespace: app-live-view

