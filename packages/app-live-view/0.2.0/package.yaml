---
apiVersion: data.packaging.carvel.dev/v1alpha1
kind: Package
metadata:
  name: appliveview.tanzu.vmware.com.0.2.0
spec:
  refName: appliveview.tanzu.vmware.com
  version: 0.2.0
  releaseNotes: |
        Release 0.2.0 of the App Live View package
  releasedAt: 2021-09-27T00:00:00Z
  valuesSchema:
    openAPIv3:
      title: appliveview.tanzu.vmware.com values schema
      properties:
        registry:
          description: 'Image Registry Details'
          properties:
            connector_namespaces:
              description: The namespaces in which ALV monitors the user's apps
              type: array
              items:
                type: string
            server_namespace:
              description: The namespace to which ALV server is deployed
              type: string
          type: object  
  template:
    spec:
      fetch:
      - imgpkgBundle:
          image: registry.pivotal.io/app-live-view/application-live-view-install-bundle:0.2.0
          secretRef:
            name: reg-cred
      template:
      - ytt:
          paths:
          - "config"
          - "values.yaml"
      - kbld:
          paths:
          - "-"
          - ".imgpkg/images.yml"
      deploy:
      - kapp: {}
---
apiVersion: v1
kind: Secret
metadata:
  name: reg-cred
  annotations:
    secretgen.carvel.dev/image-pull-secret: ""
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: e30K