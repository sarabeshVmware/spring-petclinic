apiVersion: data.packaging.carvel.dev/v1alpha1
kind: Package
metadata:
  name: ootb-supply-chain-basic.tanzu.vmware.com.0.4.0-build.2
spec:
  refName: ootb-supply-chain-basic.tanzu.vmware.com
  version: 0.4.0-build.2
  releasedAt: "2021-12-02T21:22:59Z"
  valuesSchema:
    openAPIv3:
      title: ootb-supply-chain-basic
      properties:
        cluster_builder:
          type: string
          description: Name of the Tanzu Build Service (TBS) ClusterBuilder to use by default on image objects managed by the supply chain.
          default: default
          examples:
          - default
        service_account:
          type: string
          description: Name of the service account in the namespace where the Workload is submitted to utilize for providing registry credentials to Tanzu Build Service (TBS) Image objects as well as deploying the application.
          default: default
          examples:
          - default
        registry:
          type: object
          properties:
            server:
              type: string
              description: Name of the registry server where application images should be pushed to (required).
              default: index.docker.io
              examples:
              - index.docker.io
              - gcr.io
            repository:
              type: string
              description: Name of the repository in the image registry server where the application images from the workloads should be pushed to (required).
              examples:
              - web-team
  template:
    spec:
      fetch:
      - imgpkgBundle:
          image: dev.registry.tanzu.vmware.com/ootb-supply-chain-basic/ootb-supply-chain-basic@sha256:fc05e4c1ce4ba8b387426b599cd33df37bc239079ba9dc9292e0f60313e33160
      template:
      - ytt:
          ignoreUnknownComments: true
      - kbld: {}
      deploy:
      - kapp:
          rawOptions:
          - --wait-timeout=5m
