---
apiVersion: data.packaging.carvel.dev/v1alpha1
kind: Package
metadata:
  name: tbs.tanzu.vmware.com.1.2.1
spec:
  refName: tbs.tanzu.vmware.com
  version: 1.2.1
  releaseNotes: |
        Release 1.2.1 of the tbs app package
  valuesSchema:
    openAPIv3:
      title: tbs.tanzu.vmware.com values schema
      properties:
        docker_repository:
          type: string
          description: docker repository
          default: 
          examples:
          - registry.pivotal.io/adv_pkg_bundle
        docker_username:
          type: string
          description: registry username
          default: 
          examples:
          - kdhaduk@.vmware.com
        docker_password:
          type: string
          description: registry password
          default: 
          examples:
          - password
        tanzunet_username:
          type: string
          description: tanzunet registry username required for dependency updation feature
          default: 
          examples:
          - kdhaduk@vmware.com
        tanzunet_password:
          type: string
          description: tanzunet registry password required for dependency updation feature
          default: 
          examples:
          - password   
  template:
    spec:
      fetch:
      - imgpkgBundle:
          image: registry.pivotal.io/build-service/bundle:1.2.1
          secretRef:
            name: tap-registry
      template:
      - ytt:
          paths:
          - "values.yaml"
          - "config/"
      - kbld:
          paths:
          - "-"
          - ".imgpkg/images.yml"
      deploy:
      - kapp: {}
---
