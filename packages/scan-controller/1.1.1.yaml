  releasedAt: "2022-04-19T22:13:15Z"
  template:
    spec:
      fetch:
      - imgpkgBundle:
          image: dev.registry.tanzu.vmware.com/supply-chain-security-tools/scan-controller:v1.1.1@sha256:5985b6552d6525160495cf163169da7e7991216a3e939d4c03203ed9c9a38f60
