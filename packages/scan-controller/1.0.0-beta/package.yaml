---
apiVersion: data.packaging.carvel.dev/v1alpha1
kind: Package
metadata:
  name: scanning.apps.tanzu.vmware.com.1.0.0-beta
spec:
  refName: scanning.apps.tanzu.vmware.com
  version: 1.0.0-beta
  releaseNotes: |
    Beta release of the Supply Chain Security Tools - Scan package
  valuesSchema:
    openAPIv3:
      title: scanning.apps.tanzu.vmware.com values schema
      properties:
        namespace:
          type: string
          description: Deployment namespace for the Scan Controller
          default: scan-link-system
        metadataStoreUrl:
          type: string
          description: Url of the Insight Metadata Store deployed in the cluster
          default: https://metadata-store-app.metadata-store.svc.cluster.local:8443
        metadataStoreCa:
          type: string
          description: CA Cert of the Insight Metadata Store deployed in the cluster
          default: ""
        metadataStoreTokenSecret:
          type: string
          description: Name of the Secret for the Insight Metadata Store Token deployed in the cluster
          default: ""
        resources:
          type: object
          properties:
            limits:
              type: object
              properties:
                cpu:
                  anyOf:
                  - type: integer
                  - type: string
                  pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                  x-kubernetes-int-or-string: true
                  description: Limits describes the maximum amount of cpu resources allowed.
                  default: 250m
                memory:
                  anyOf:
                  - type: integer
                  - type: string
                  pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                  x-kubernetes-int-or-string: true
                  description: Limits describes the maximum amount of memory resources allowed.
                  default: 256Mi
            requests:
              type: object
              properties:
                cpu:
                  anyOf:
                  - type: integer
                  - type: string
                  pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                  x-kubernetes-int-or-string: true
                  description: Requests describes the minimum amount of cpu resources required.
                  default: 100m
                memory:
                  anyOf:
                  - type: integer
                  - type: string
                  pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                  x-kubernetes-int-or-string: true
                  description: Requests describes the minimum amount of memory resources required.
                  default: 128Mi
  template:
    spec:
      fetch:
      - imgpkgBundle:
          image: dev.registry.tanzu.vmware.com/supply-chain-security-tools/scan-controller:v1.0.0-beta.1
      template:
      - ytt:
          paths:
          - "config/"
      - kbld:
          paths:
          - "-"
          - ".imgpkg/images.yml"
      deploy:
      - kapp: {}
