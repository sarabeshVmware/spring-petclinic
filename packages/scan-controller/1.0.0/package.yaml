apiVersion: data.packaging.carvel.dev/v1alpha1
kind: Package
metadata:
  name: scst-scan.apps.tanzu.vmware.com.1.0.0
spec:
  refName: scst-scan.apps.tanzu.vmware.com
  version: 1.0.0
  releaseNotes: Supply Chain Security Tools - Scan (Scan Controller) v1.0.0
  releasedAt: 2021-11-25T15:28:04Z
  template:
    spec:
      fetch:
      - imgpkgBundle:
          image: dev.registry.tanzu.vmware.com/supply-chain-security-tools/scan-controller@sha256:b8117138f075b75aae93fc6c11c02ad0e36eb3192476ade57dcda039d17139e2
      template:
      - ytt:
          paths:
          - config/
      - kbld:
          paths:
          - '-'
          - .imgpkg/images.yml
      deploy:
      - kapp: {}
  valuesSchema:
    openAPIv3:
      title: scst-scan.apps.tanzu.vmware.com.1.0.0 values schema
      properties:
        namespace:
          type: string
          description: Deployment namespace for the Scan Controller
          default: scan-link-system
        metadataStore.url:
          type: string
          description: Url of the Insight Metadata Store deployed in the cluster
          default: "https://metadata-store-app.metadata-store.svc.cluster.local:8443"
        metadataStore.caSecret:
          type: object
          description: CA Cert of the Insight Metadata Store deployed in the cluster
          properties:
            name:
              type: string
              description: Name of deployed Secret with key ca.crt holding the CA Cert of the Insight Metadata Store
              default: "app-tls-cert"
            importFromNamespace:
              type: string
              description: Namespace from which to import the Insight Metadata Store CA Cert
              default: "metadata-store"
        metadataStore.clusterRole:
          type: string
          description: Name of the deployed ClusterRole for read/write access to the Insight Metadata Store deployed in the cluster
          default: "metadata-store-read-write"
        resources:
          type: object
          properties:
            limits:
              type: object
              properties:
                cpu:
                  anyOf:
                  - type: integer
                  - type: string
                  pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                  x-kubernetes-int-or-string: true
                  description: Limits describes the maximum amount of cpu resources allowed.
                  default: 250m
                memory:
                  anyOf:
                  - type: integer
                  - type: string
                  pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                  x-kubernetes-int-or-string: true
                  description: Limits describes the maximum amount of memory resources allowed.
                  default: 256Mi
            requests:
              type: object
              properties:
                cpu:
                  anyOf:
                  - type: integer
                  - type: string
                  pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                  x-kubernetes-int-or-string: true
                  description: Requests describes the minimum amount of cpu resources required.
                  default: 100m
                memory:
                  anyOf:
                  - type: integer
                  - type: string
                  pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                  x-kubernetes-int-or-string: true
                  description: Requests describes the minimum amount of memory resources required.
                  default: 128Mi
