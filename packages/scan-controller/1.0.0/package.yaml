  valuesSchema:
    openAPIv3:
      title: scst-scan.apps.tanzu.vmware.com.1.0.0 values schema
      properties:
        namespace:
          type: string
          description: Deployment namespace for the Scan Controller
          default: scan-link-system
        metadataStore:
          type: object
          description: Configure integration with an Insight Metadata Store deployed in the cluster
          properties:
            url:
              type: string
              description: Url of the Insight Metadata Store
              default: https://metadata-store-app.metadata-store.svc.cluster.local:8443
            caSecret:
              type: object
              description: CA Cert of the Insight Metadata Store deployed in the cluster
              properties:
                name:
                  type: string
                  description: Name of deployed Secret with key ca.crt holding the CA Cert of the Insight Metadata Store
                  default: app-tls-cert
                importFromNamespace:
                  type: string
                  description: Namespace from which to import the Insight Metadata Store CA Cert
                  default: metadata-store
            clusterRole:
              type: string
              description: Name of the deployed ClusterRole for read/write access to the Insight Metadata Store
              default: metadata-store-read-write
        resources:
          type: object
          properties:
            limits:
              type: object
              properties:
                cpu:
