apiVersion: data.packaging.carvel.dev/v1alpha1
kind: PackageMetadata
metadata:
  name: policy.apps.tanzu.vmware.com
spec:
  displayName: "Supply Chain Security Tools - Policy Controller"
  longDescription: "Policy Controller allows platform operators to define a policy that will restrict unsigned images on a Kubernetes cluster. This component contains logic to communicate with external registries and verify signatures on container images, making a decision based on the results of this verification. Currently, this component supports cosign signatures and its key formats."
  shortDescription: "Policy Controller enables defining of a policy to restrict unsigned container images."
  supportDescription: "https://tanzu.vmware.com/support"
  providerName: "VMware"
  categories:
  - policy
  maintainers:
  - name: "Adam Dawson"
  - name: "Adam Shamblin"
  - name: "Andrés Torres"
  - name: "Denny Hoang"
  - name: "Der Wei Chan"
  - name: "Héctor Fernandez"
