apiVersion: data.packaging.carvel.dev/v1alpha1
kind: Package
metadata:
  name: ootb-templates.tanzu.vmware.com.0.8.0-build.2
spec:
  refName: ootb-templates.tanzu.vmware.com
  version: 0.8.0-build.2
  releasedAt: "2022-06-06T20:43:41Z"
  valuesSchema:
    openAPIv3:
      title: ootb-templates
      properties:
        excluded_templates:
          type: array
          items:
            type: string
          default: []
          description: List of templates to exclude from the installation (e.g. ['git-writer'])
        iaas_auth:
          type: boolean
          default: false
          description: Enable the use of IAAS based authentication for imgpkg
  template:
    spec:
      fetch:
      - imgpkgBundle:
          image: dev.registry.tanzu.vmware.com/ootb-templates/ootb-templates@sha256:17be608382541f234ec32b98ab45754d58d4bb035088852bf80c68b6982a8d6c
      template:
      - ytt:
          ignoreUnknownComments: true
      - kbld:
          paths:
          - '-'
          - .imgpkg/images.yml
      deploy:
      - kapp:
          rawOptions:
          - --wait-timeout=5m
