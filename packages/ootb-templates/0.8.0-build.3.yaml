apiVersion: data.packaging.carvel.dev/v1alpha1
kind: Package
metadata:
  name: ootb-templates.tanzu.vmware.com.0.8.0-build.3
spec:
  refName: ootb-templates.tanzu.vmware.com
  version: 0.8.0-build.3
  releasedAt: "2022-06-09T20:11:44Z"
  valuesSchema:
    openAPIv3:
      title: ootb-templates
      properties:
        excluded_templates:
          type: array
          items:
            type: string
          default: []
          description: List of templates to exclude from the installation (e.g. ['git-writer'])
        iaas_auth:
          type: boolean
          default: false
          description: Enable the use of IAAS based authentication for imgpkg
  template:
    spec:
      fetch:
      - imgpkgBundle:
          image: dev.registry.tanzu.vmware.com/ootb-templates/ootb-templates@sha256:0ba62d7929d88721f4a871b2a2531c27379505062d3d82c09c8d2b3e745b37c2
      template:
      - ytt:
          ignoreUnknownComments: true
      - kbld:
          paths:
          - '-'
          - .imgpkg/images.yml
      deploy:
      - kapp:
          rawOptions:
          - --wait-timeout=5m
