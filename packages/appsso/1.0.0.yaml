    ### BREAKING CHANGES

    * changes client credentials secret data.provider to 'appsso'
    * changes client credentials secret type to servicebinding.io/oauth2
    * client credential secret entries are dash-cased now
    * only the aggregating role app-operator edit ClientRegistration
    * requires package service-bindings.labs.vmware.com
    * The services-toolkit.tanzu.vmware.com package is now a required
    dependency of AppSSO.
    * Removes property 'token-signature-keys'
    * remove status field from clientRegistration CR
    * drop redis.persistence properties

    - EXPIRY times for tokens in Redis are set according to the expiry dates
      on the token themselves.
    - All tokens are folded into an 'OAuth2Authorization' object. The way we
      make those tokens accessible is to make a single entry with all the
      data in redis, and then specific entries per token, pointing to the
      root OAuth2Authorization. e.g. there will be an
      appsso:authorization:refresh_token:TOKEN_VALUE pointing to an
      appsso:authorization:id:... .
    - Each reference has an expiry set according to its Time-To-Live. The
      root object has an expiry == the longest expiry of all the objects
      referring to it (usually a refresh_token, should there be one).
    - Note that we add a 1mn buffer to account for clock skew and avoiding
      invalidating entries 'too quickly'.
    - I had to introduce OAuth2AuthorizationCodeMixin to be able to save and
      load expiry times down to the millisecond (this speeds up the tests).
      Other token types are covered by a spring-security mixin, discovered
      through magic-strings at runtime, in SecurityJackson2Modules (they
      live in OAuth2ClientJackson2Module).
    * remove operator.leader_election from values.yml

    Do not expose leader election as it is an internal implementation
    detail.
    * **deployment:** The configuration path auth_server.tls.* is no longer
    available. The PKCS12 keystore's password is static as configuring it
    provides no added security.
    * client registration format has been changed from 'name' of the
    ClientRegistration CR name to [namespace]_[name] of the ClientRegistration CR.
    * sso.identity-providers[].internal is not supported
    anymore. Use sso.identity-providers[].internal-unsafe instead.
    * Removes spring.security.saml properties from the
    configuration. Use sso.identity-providers[].saml instead.
    * TokenSigningKeySet is renamed to TokenSignatureKeySet
    with new spec fields.

