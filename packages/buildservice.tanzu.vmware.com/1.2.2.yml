---
apiVersion: data.packaging.carvel.dev/v1alpha1
kind: Package
metadata:
  name: buildservice.tanzu.vmware.com.1.2.2
spec:
  refName: buildservice.tanzu.vmware.com
  version: 1.2.2
  releasedAt: "2021-07-20T00:00:00Z"
  capacityRequirementsDescription: Cluster with nodes > 50GB ephemeral storage, Registry > 5GB available space
  releaseNotes: "https://docs.pivotal.io/build-service/1-2/release-notes.html#1-2-2"
  valuesSchema:
    openAPIv3:
      title: buildservice.tanzu.vmware.com values schema
      properties:
        docker_repository:
          type: string
          description: docker repository
          default:
          examples:
            - registry.pivotal.io/tap_pkg_bundle
        docker_username:
          type: string
          description: registry username
          default:
          examples:
            - janedoe@pivotal.io
        docker_password:
          type: string
          description: registry password
          default:
          examples:
            - password
        tanzunet_username:
          type: string
          description: tanzunet registry username required for dependency updater feature
          default:
          examples:
            - janedoe@pivotal.io
        tanzunet_password:
          type: string
          description: tanzunet registry password required for dependency updater feature
          default:
          examples:
            - password
  template:
    spec:
      fetch:
        - imgpkgBundle:
            image: registry.pivotal.io/build-service/bundle:1.2.2
            secretRef:
              name: tap-registry
      template:
        - ytt:
            paths:
              - "values.yaml"
              - "config/"
        - kbld:
            paths:
              - "-"
              - ".imgpkg/images.yml"
      deploy:
        - kapp: {}
