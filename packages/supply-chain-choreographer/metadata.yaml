apiVersion: data.packaging.carvel.dev/v1alpha1
kind: PackageMetadata
metadata:
  name: supplychainchoreographer.tanzu.vmware.com
spec:
  displayName: "Supply Chain Choreographer"
  providerName: "VMware"
  shortDescription: "Kubernetes native Supply Chain Choreographer."
  supportDescription: "https://tanzu.vmware.com/support"
  longDescription: |-
    Supply Chain Choreographer allows users to configure Kubernetes
    resources into re-usable Supply Chains that can be used to define
    all of the stages that an Application Workload must go through to
    get to an environment.
  maintainers:
    - name: "VMware"
