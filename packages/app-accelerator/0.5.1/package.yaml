---
apiVersion: data.packaging.carvel.dev/v1alpha1
kind: Package
metadata:
  name: accelerator.apps.tanzu.vmware.com.0.5.1
spec:
  refName: accelerator.apps.tanzu.vmware.com
  version: 0.5.1
  releasedAt: 2021-12-02T00:00:00Z
  releaseNotes: |
        Beta release 0.5.1 of the Application Accelerator for VMware Tanzu package
  valuesSchema:
    openAPIv3:
      title: accelerator.apps.tanzu.vmware.com values schema
      properties:
        server:
          description: 'UI Server Configuration'
          properties:
            service_type:
              type: string
              description: The service type for the acc-server service.
              default: LoadBalancer
              examples:
              - NodePort
            watched_namespace:
              type: string
              description: The namespace that the server watches for accelerator resources.
              default: default
            engine_invocation_url:
              type: string
              description: The URL the server uses for invoking the accelerator engine.
              default: "http://acc-engine.accelerator-system.svc.cluster.local/invocations"
          type: object
        engine:
          description: 'Accelerator Engine Configuration'
          properties:
            service_type:
              type: string
              description: The service type for the Service of the engine.
              default: ClusterIP
              examples:
              - NodePort
            max_direct_memory_size:
              type: string
              description: The max size for the Java -XX:MaxDirectMemorySize setting.
              default: 32M
              examples:
              - 64M
          type: object
        samples:
          description: 'Sample Configuration'
          properties:
            include:
              type: boolean
              description: Whether to include the bundled sample Accelerators in the install.
              default: true
          type: object
        ingress:
          description: 'Ingress Configuration'
          properties:
            include:
              type: boolean
              description: Whether to include the ingress configuration in the install.
              default: false
          type: object
        domain:
          description: 'Top level domain to use for ingress configuration'
          default: tap.example.com
          type: string
        tls:
          description: 'TLS Secret Configuration'
          properties:
            secretName:
              type: string
              description: The name of the secret.
              default: tls
            namespace:
              type: string
              description: The namespace for the secret.
              default: tanzu-system-ingress
          type: object
  template:
    spec:
      fetch:
      - imgpkgBundle:
          image: dev.registry.tanzu.vmware.com/app-accelerator/acc-install-bundle:0.5.0
      template:
      - ytt:
          paths:
          - "config"
          - "values.yml"
      - kbld:
          paths:
          - "-"
          - ".imgpkg/images.yml"
      deploy:
      - kapp: {}
