---
apiVersion: data.packaging.carvel.dev/v1alpha1
kind: Package
metadata:
  name: accelerator.apps.tanzu.vmware.com.1.2.1
spec:
  refName: accelerator.apps.tanzu.vmware.com
  version: 1.2.1
  releasedAt: 2022-06-22T17:00:00Z
  releaseNotes: |
        Release 1.2.1 of the Application Accelerator for VMware Tanzu package
  valuesSchema:
    openAPIv3:
      title: accelerator.apps.tanzu.vmware.com values schema
      properties:
        server:
          description: 'UI Server Configuration'
          properties:
            service_type:
              type: string
              description: The service type for the acc-server service.
              default: LoadBalancer
              examples:
              - NodePort
            watched_namespace:
              type: string
              description: The namespace that the server watches for accelerator resources.
              default: default
            engine_invocation_url:
              type: string
              description: The URL the server uses for invoking the accelerator engine.
              default: "http://acc-engine.accelerator-system.svc.cluster.local/invocations"
          type: object
        engine:
          description: 'Accelerator Engine Configuration'
          properties:
            service_type:
              type: string
              description: The service type for the Service of the engine.
              default: ClusterIP
              examples:
              - NodePort
            max_direct_memory_size:
              type: string
              description: The max size for the Java -XX:MaxDirectMemorySize setting.
              default: 32M
              examples:
              - 64M
          type: object
        samples:
          description: 'Sample Configuration'
          properties:
            include:
              type: boolean
              description: Whether to include the bundled sample Accelerators in the install.
              default: true
          type: object
        ingress:
          description: 'Ingress Configuration'
          properties:
            include:
              type: boolean
              description: Whether to include the ingress configuration in the install.
              default: false
            enable_tls:
              type: boolean
              description: Whether to include TLS for the ingress configuration.
              default: false
          type: object
        domain:
          description: 'Top level domain to use for ingress configuration'
          default: tap.example.com
          type: string
        tls:
          description: 'TLS Secret Configuration'
          properties:
            secret_name:
              type: string
              description: The name of the secret.
              default: tls
            namespace:
              type: string
              description: The namespace for the secret.
              default: tanzu-system-ingress
          type: object
        telemetry:
          description: 'Telemetry Configuration'
          properties:
            record_invocation_events:
              type: boolean
              description: Should the system record each engine invocation when generating files for an accelerator?
              default: true
            retain_invocation_events_for_no_days:
              type: integer
              description: The number of days to retain recorded invocation events resources.
              default: 30
          type: object
  template:
    spec:
      fetch:
      - imgpkgBundle:
          image: dev.registry.tanzu.vmware.com/app-accelerator/acc-install-bundle@sha256:d826c03fed4006fd499d388d0888cef250426b9fe7d3dce37bf38c4c04221bf8
      template:
      - ytt:
          paths:
          - "config"
          - "values.yml"
      - kbld:
          paths:
          - "-"
          - ".imgpkg/images.yml"
      deploy:
      - kapp: {}
