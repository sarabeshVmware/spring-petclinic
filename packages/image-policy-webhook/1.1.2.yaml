apiVersion: data.packaging.carvel.dev/v1alpha1
kind: Package
metadata:
  name: image-policy-webhook.signing.apps.tanzu.vmware.com.1.1.2
spec:
  refName: image-policy-webhook.signing.apps.tanzu.vmware.com
  version: 1.1.2
  releaseNotes: |
    Supply Chain Security Tools - Sign v1.1.2
    - FIX: Update Golang to 1.17.9
  releasedAt: 2022-04-20T18:00:00Z
  template:
    spec:
      fetch:
      - imgpkgBundle:
          image: dev.registry.tanzu.vmware.com/supply-chain-security-tools/image-policy-webhook-bundle@sha256:cf45fa20ca196d5e5c1a0150956cd8aab0fc995dc90ed06ac1948ab9b21a1495
      template:
      - ytt:
          paths:
          - config/
      - kbld:
          paths:
          - '-'
          - .imgpkg/images.yml
      deploy:
      - kapp: {}
  valuesSchema:
    openAPIv3:
      title: image-policy-webhook.signing.apps.tanzu.vmware.com.1.1.2 values schema
      examples:
      - allow_unmatched_images: true
      properties:
        allow_unmatched_images:
          type: boolean
          description: |
            Feature flag for enabling admission of images that do not match any patterns in the image policy configuration.
            Set to true to allow images that do not match any patterns into the cluster with a warning.
          default: false
          examples:
          - true
        quota:
          type: object
          description: |
            Contains configuration for ResourceQuotas.
          properties:
            pod_number:
              type: string
              description: |
                The maximum number of Image Policy Webhook Pods allowed to be created with the priority class
                system-cluster-critical. This value must be enclosed in quotes ("").
                If this value is not specified then a default value of 5 is used.
              default: "5"
              examples:
              - "10"
        replicas:
          type: integer
          description: |
            The number of replicas to be created for the Image Policy Webhook. This value must not be enclosed
            in quotes.
            If this value is not specified then a default value of 1 is used.
          default: 1
          examples:
          - 6
        limits_cpu:
          type: string
          description: |
            The CPU limit defines a hard ceiling on how much CPU time that the
            Image Policy Webhook controller manager container can use.
            https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/#meaning-of-cpu
          default: 200m
          examples:
          - '"1.0" or "1000m"'
          - '"0.5" or "500m"'
        limits_memory:
          type: string
          description: |
            The memory limit defines a hard ceiling on how much memory that the
            Image Policy Webhook controller manager container can use.
            https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/#meaning-of-memory
          default: 256Mi
          examples:
          - '"200Mi"(200 mebibytes)'
          - '"200M" (200 megabytes)'
          - '"200m" (0.2 bytes)'
        requests_cpu:
          type: string
          description: |
            The CPU request defines the minimum CPU time for the Image Policy Webhook controller manager.
            During CPU contention, CPU request is used as a weighting where higher CPU requests are
            allocated more CPU time.
            https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/#meaning-of-cpu
          default: 100m
          examples:
          - '"1.0" or "1000m"'
          - '"0.5" or "500m"'
        requests_memory:
          type: string
          description: |
            The memory request defines the minium memory amount for the Image Policy Webhook controller manager.
            https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/#meaning-of-memory
          default: 50Mi
          examples:
          - '"200Mi"(200 mebibytes)'
          - '"200M" (200 megabytes)'
          - '"200m" (0.2 bytes)'
        deployment_namespace:
          type: string
          default: image-policy-system
          description: |
            Deployment namespace specifies the namespace where this component should be deployed to.
            If not specified, "image-policy-system" is assumed.
          examples:
          - scst-sign-webhook-system
          - verification-system
        custom_ca_secrets:
          type: array
          items:
            type: object
            properties:
              secret_name:
                type: string
                description: |
                  Name of the secret to be referred to.
              namespace:
                type: string
                description: |
                  Namespace where the secret resides.
            required:
            - secret_name
            - namespace
          description: |
            List of custom CA secrets that should be included in the application container for registry communication.
            An array of secret references each containing a secret_name field with the secret name to be referenced
            and a namespace field with the name of the namespace where the referred secret reside.
        custom_cas:
          type: array
          items:
            type: object
            properties:
              ca_content:
                type: string
                description: |
                  Certificate Authority (CA) certificate content in PEM-encoded format.
            required:
            - ca_content
          description: |
            List of custom CA contents that should be included in the application container for registry communication.
            An array of items containing a ca_content field with the PEM-encoded contents of a certificate authority.
