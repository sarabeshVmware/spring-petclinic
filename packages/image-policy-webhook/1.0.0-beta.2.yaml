---
apiVersion: data.packaging.carvel.dev/v1alpha1
kind: Package
metadata:
  name: image-policy-webhook.signing.run.tanzu.vmware.com.1.0.0-beta.2
spec:
  refName: image-policy-webhook.signing.run.tanzu.vmware.com
  releaseNotes: |
    Supply Chain Security Tools - Sign v1.0.0-beta.2
    - Added configuration for ResourceQuotas. See quota.pod_number
    - Number of replicas can be configured via replicas value
  releasedAt: 2021-11-29T14:00:00Z
  template:
    spec:
      deploy:
      - kapp: {}
      fetch:
      - imgpkgBundle:
          image: dev.registry.tanzu.vmware.com/supply-chain-security-tools/image-policy-webhook-bundle@sha256:168dee240f6bd2442165056117fe98221162482e176aac9b75deef20774817bd
      template:
      - ytt:
          paths:
          - config/
      - kbld:
          paths:
          - '-'
          - .imgpkg/images.yml
  valuesSchema:
    openAPIv3:
      examples:
      - allow_unmatched_images: true
      properties:
        allow_unmatched_images:
          default: false
          description: |
            Feature flag for enabling admission of images that do not match any patterns in the image policy configuration.
            Set to true to allow images that do not match any patterns into the cluster with a warning.
          examples:
          - true
          type: boolean
        quota:
          description: |
            Contains configuration for ResourceQuotas.
          properties:
            pod_number:
              default: "5"
              description: |
                The maximum number of Image Policy Webhook Pods allowed to be created with the priority class
                system-cluster-critical. This value must be enclosed in quotes ("").
                If this value is not specified then a default value of 5 is used.
              examples:
              - "10"
              type: string
          type: object
        replicas:
          default: 1
          description: |
            The number of replicas to be created for the Image Policy Webhook. This value must not be enclosed
            in quotes.
            If this value is not specified then a default value of 1 is used.
          examples:
          - 6
          type: integer
      title: image-policy-webhook.signing.run.tanzu.vmware.com.1.0.0-beta.2 values
        schema
  version: 1.0.0-beta.2