apiVersion: data.packaging.carvel.dev/v1alpha1
kind: PackageMetadata
metadata:
  name: api-portal.tanzu.vmware.com
spec:
  displayName: API portal
  longDescription: |-
    API portal promotes collaboration across different lines of business teams.
    The API service provider exposes the API endpoints by adding the OpenAPI URL into the API portal deployment and document the API endpoints in the OpenAPI format in the portal.
    The API consumer therefore can discover the API endpoints and further try out the endpoints and receive sample responses in the portal.
  shortDescription: A unified user interface to enable search, discovery and try-out of API endpoints at ease.
  categories: []
  providerName: VMware
  iconSVGBase64: 
  maintainers:
  - name: VMware
  supportDescription: https://tanzu.vmware.com/support
