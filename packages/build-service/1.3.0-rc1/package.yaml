---
apiVersion: data.packaging.carvel.dev/v1alpha1
kind: Package
metadata:
  name: buildservice.tanzu.vmware.com.1.3.0-rc1
spec:
  refName: buildservice.tanzu.vmware.com
  version: 1.3.0-rc1
  releasedAt: "2021-09-28T00:00:00Z"
  capacityRequirementsDescription: Cluster with nodes > 50GB ephemeral storage, Registry > 5GB available space
  releaseNotes: https://docs.pivotal.io/build-service/1-3/release-notes.html
  valuesSchema:
    openAPIv3:
      title: buildservice.tanzu.vmware.com values schema
      properties:
        kp_default_repository:
          type: string
          description: docker repository (required)
          examples:
          - registry.io/build-service
        kp_default_repository_username:
          type: string
          description: registry username (required)
          examples:
          - janedoe@vmware.com
        kp_default_repository_password:
          type: string
          description: registry password (required)
          examples:
          - password
        tanzunet_username:
          type: string
          description: tanzunet registry username (required for dependency updater feature)
          examples:
          - janedoe@vmware.com
        tanzunet_password:
          type: string
          description: tanzunet registry password (required for dependency updater feature)
          examples:
          - password
        pull_from_tanzunet:
          type: bool
          description: pull tbs images directly from tanzunet (use TBS without image relocation)
        ca_cert_data:
          type: string
          description: tbs registry ca certificate
  template:
    spec:
      fetch:
      - imgpkgBundle:
          image: registry.tanzu.vmware.com/build-service/bundle@sha256:5f80ed18676d71a0b40e5b878fd9b5f9676d27e2e4f94d47822124cd99dfeb11
      template:
      - ytt:
          paths:
          - values.yaml
          - config/
      - kbld:
          paths:
          - '-'
          - .imgpkg/images.yml
      deploy:
      - kapp: {}
