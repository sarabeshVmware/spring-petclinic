---
apiVersion: data.packaging.carvel.dev/v1alpha1
kind: Package
metadata:
  name: backend.appliveview.tanzu.vmware.com.1.2.0-build.2
spec:
  refName: backend.appliveview.tanzu.vmware.com
  version: 1.2.0-build.2
  releaseNotes: |
        Release 1.2.0-build.2 of the App Live View package
  releasedAt: 2022-06-10T00:00:00Z
  valuesSchema:
    openAPIv3:
      title: backend.appliveview.tanzu.vmware.com values schema
      properties:
        ingressEnabled:
          type: boolean
          description: |
            Flag for whether or not to create an HTTPProxy for ingress.
          default: false
        ingressDomain:
          type: string
          description: |
            Domain to be used by the HTTPProxy ingress object. The "appliveview"
            subdomain will be prepended to the value provided. For example:
            "example.com" would become "appliveview.example.com".
          default: tap.example.com
        tls:
          type: object
          description: |
            Object for specifying TLS certificate delegation.
          properties:
            namespace:
              type: string
              description: |
                The targeted namespace for secret consumption by the HTTPProxy.
            secretName:
              type: string
              description: |
                The name of secret for consumption by the HTTPProxy.
  template:
    spec:
      fetch:
      - imgpkgBundle:
          image: dev.registry.tanzu.vmware.com/app-live-view/application-live-view-install-bundle@sha256:5da3480b5c309c8bd56bc44f17d02d9d46e71ea0c6dceb13c24335bb6745ef0b

      template:
      - ytt:
          paths:
          - "config"
          - "values.yaml"
      - kbld:
          paths:
          - "-"
          - ".imgpkg/images.yml"
      deploy:
      - kapp: {}
