namespace: tap-install
secrets:
  - name: tap-registry
    registry: registry.tanzu.vmware.com
    username: # TANZUNET_USERNAME
    password: # TANZUNET_PASSWORD
package_repository:
  name: tanzu-tap-repository
  image: registry.tanzu.vmware.com/tanzu-application-platform/tap-packages:0.2.0
packages:
  ## INDEPENDENT PACKAGES:
  - name: accelerator.apps.tanzu.vmware.com
    installed_name: accelerator-apps
    version: 0.3.0
    use_values_file: app-accelerator.yaml
  - name: api-portal.tanzu.vmware.com
    installed_name: api-portal
    version: 1.0.2
  - name: cnrs.tanzu.vmware.com
    installed_name: cnrs
    version: 1.0.2
    use_values_file: cloud-native-runtimes.yaml
  - name: controller.source.apps.tanzu.vmware.com
    installed_name: controller-source
    version: 0.1.2
  - name: scp-toolkit.tanzu.vmware.com
    installed_name: scp-toolkit
    version: 0.3.0
  - name: service-bindings.labs.vmware.com
    installed_name: service-bindings-labs
    version: 0.5.0
  - name: buildservice.tanzu.vmware.com
    installed_name: buildservice
    version: 1.3.0
    use_values_file: tanzu-build-service.yaml

  ## DEPENDENT PACKAGES:
  ### appliveview requires controller-conventions; developer-conventions requires appliveview
  - name: controller.conventions.apps.tanzu.vmware.com
    installed_name: controller-conventions
    version: 0.4.2
  - name: appliveview.tanzu.vmware.com
    installed_name: appliveview
    version: 0.2.0
    use_values_file: app-live-view.yaml
  - name: developer-conventions.tanzu.vmware.com
    installed_name: developer-conventions
    version: 0.2.0
  ### default-supply-chain-testing requires cartographer; default-supply-chain requires cartographer
  ### NOTE: install only one of default-supply-chain-testing and default-supply-chain
  - name: cartographer.tanzu.vmware.com
    installed_name: cartographer
    version: 0.0.6
  - name: default-supply-chain-testing.tanzu.vmware.com
    installed_name: default-supply-chain-testing
    version: 0.2.0
    use_values_file: default-supply-chain.yaml
  - name: default-supply-chain.tanzu.vmware.com
    installed_name: default-supply-chain
    version: 0.2.0
    use_values_file: default-supply-chain.yaml
  ### grype-scanning-apps requires scanning-apps
  - name: scanning.apps.tanzu.vmware.com
    installed_name: scanning-apps
    version: 1.0.0-beta
    use_values_file: scst-scan-controller.yaml
  - name: grype.scanning.apps.tanzu.vmware.com
    installed_name: grype-scanning-apps
    version: 1.0.0-beta
  ### image-policy-webhook-signing-run requires scst-store
  - name: scst-store.tanzu.vmware.com
    installed_name: scst-store
    version: 1.0.0-beta.0
    use_values_file: scst-store.yaml
  - name: image-policy-webhook.signing.run.tanzu.vmware.com
    installed_name: image-policy-webhook-signing-run
    version: 1.0.0-beta.0
    use_values_file: scst-sign.yaml
