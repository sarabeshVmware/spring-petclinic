---
apiVersion: packaging.carvel.dev/v1alpha1
kind: PackageInstall
metadata:
  name: conventions-controller
  namespace: tap-install
  annotations:
    kapp.k14s.io/change-group: conventions
    kapp.k14s.io/change-rule.cert-manager: "upsert after upserting cert-manager" 
    kapp.k14s.io/change-rule.serviceaccount: "delete before deleting serviceaccount"
spec:
  serviceAccountName: tap-install-sa
  packageRef:
    refName: controller.conventions.apps.tanzu.vmware.com
    versionSelection:
      constraints: 0.6.3
  values:
  - secretRef:
      name: conventions-controller-values
---
apiVersion: v1
kind: Secret
metadata:
  name: conventions-controller-values
  namespace: tap-install
stringData:
  values.yaml: #@ yaml.encode(collect_values())

#@ end
#@ end
