apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: tap-install-cluster-admin-role
  annotations: 
    kapp.k14s.io/change-group: serviceaccount
rules:
- apiGroups:
  - '*'
  resources:
  - '*'
  verbs:
  - '*'
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: tap-install-cluster-admin-role-binding
  annotations: 
    kapp.k14s.io/change-group: serviceaccount
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: tap-install-cluster-admin-role
subjects:
- kind: ServiceAccount
  name: tap-install-sa
  namespace: tap-install
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: tap-install-sa
  namespace: tap-install
  annotations: 
    kapp.k14s.io/change-group: serviceaccount
    
