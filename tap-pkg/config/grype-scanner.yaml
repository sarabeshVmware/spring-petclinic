#@ load("@ytt:data", "data")
#@ load("@ytt:yaml", "yaml")
#@ load("_profiles.star", "profiles")

#@ if profiles.is_any_enabled([profiles.full, profiles.build]):
#@ if profiles.is_pkg_enabled("grype.scanning.apps.tanzu.vmware.com"):

---
apiVersion: packaging.carvel.dev/v1alpha1
kind: PackageInstall
metadata:
  name: grype
  namespace: tap-install
  annotations:
    kapp.k14s.io/change-rule: "upsert after upserting scancontroller"
spec:
  serviceAccountName: tap-install-sa
  packageRef:
    refName: grype.scanning.apps.tanzu.vmware.com
    versionSelection:
      constraints: 1.0.0-beta.2
      prereleases: {}
  values:
  - secretRef:
      name: grype-values
---
apiVersion: v1
kind: Secret
metadata:
  name: grype-values
  namespace: tap-install
stringData:
  values.yaml: #@ yaml.encode(data.values.grype)

#@ end
#@ end
