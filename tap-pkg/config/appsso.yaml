#@ load("@ytt:data", "data")
#@ load("@ytt:yaml", "yaml")
#@ load("_profiles.star", "profiles")

#@ if profiles.is_any_enabled([profiles.iterate, profiles.run, profiles.full]):
#@ if profiles.is_pkg_enabled("sso.apps.tanzu.vmware.com"):

---
apiVersion: packaging.carvel.dev/v1alpha1
kind: PackageInstall
metadata:
  name: appsso
  namespace: tap-install
  annotations:
    kapp.k14s.io/change-rule.cert-manager: "upsert after upserting cert-manager"
    kapp.k14s.io/change-rule.serviceaccount: "delete before deleting serviceaccount"
spec:
  serviceAccountName: tap-install-sa
  packageRef:
    refName: sso.apps.tanzu.vmware.com
    versionSelection:
      constraints: 1.0.0-build.3
      prereleases: {}
  values:
  - secretRef:
      name: appsso-values
---
apiVersion: v1
kind: Secret
metadata:
  name: appsso-values
  namespace: tap-install
stringData:
  values.yaml: #@ yaml.encode(data.values.appsso)

#@ end
#@ end
