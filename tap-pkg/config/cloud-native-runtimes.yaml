#@ load("@ytt:data", "data")
#@ load("@ytt:yaml", "yaml")
#@ load("_profiles.star", "profiles")

#@ if profiles.is_any_enabled([profiles.full, profiles.dev, profiles.run]):
#@ if profiles.is_pkg_enabled("cnrs.tanzu.vmware.com"):

---
apiVersion: packaging.carvel.dev/v1alpha1
kind: PackageInstall
metadata:
  name: cnrs
  namespace: tap-install
  annotations: 
    kapp.k14s.io/change-rule: "delete before deleting serviceaccount"
spec:
  serviceAccountName: tap-install-sa
  packageRef:
    refName: cnrs.tanzu.vmware.com
    versionSelection:
      constraints: 1.0.3
  values:
  - secretRef:
      name: cnrs-values
---
apiVersion: v1
kind: Secret
metadata:
  name: cnrs-values
  namespace: tap-install
stringData:
  values.yaml: #@ yaml.encode(data.values.cnrs)

#@ end
#@ end
