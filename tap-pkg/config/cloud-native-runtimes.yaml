#@ load("@ytt:data", "data")
#@ load("@ytt:yaml", "yaml")
#@ load("_profiles.star", "profiles")

#@ if profiles.is_any_enabled([profiles.full, profiles.dev_light, profiles.operator_light]):

---
apiVersion: packaging.carvel.dev/v1alpha1
kind: PackageInstall
metadata:
  name: cloud-native-runtimes
  namespace: tap-install
spec:
  serviceAccountName: tap-install-sa
  packageRef:
    refName: cnrs.tanzu.vmware.com
    versionSelection:
      constraints: 1.0.2
  values:
  - secretRef:
      name: cloud-native-runtimes-values
---
apiVersion: v1
kind: Secret
metadata:
  name: cloud-native-runtimes-values
  namespace: tap-install
stringData:
  values.yaml: #@ yaml.encode(data.values.cnrs)

#@ end
