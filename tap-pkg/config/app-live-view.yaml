#@ load("@ytt:data", "data")
#@ load("@ytt:yaml", "yaml")
#@ load("_profiles.star", "profiles")

#@ if profiles.is_any_enabled([profiles.full, profiles.dev, profiles.run]):
#@ if profiles.is_pkg_enabled("run.appliveview.tanzu.vmware.com"):

---
apiVersion: packaging.carvel.dev/v1alpha1
kind: PackageInstall
metadata:
  name: appliveview
  namespace: tap-install
  annotations:
    kapp.k14s.io/change-rule.conventions: "upsert after upserting conventions"
    kapp.k14s.io/change-rule.serviceaccount: "delete before deleting serviceaccount"
spec:
  serviceAccountName: tap-install-sa
  packageRef:
    refName: run.appliveview.tanzu.vmware.com
    versionSelection:
      constraints: 1.0.0
      prereleases: {}
  values:
  - secretRef:
      name: appliveview-values
---
apiVersion: v1
kind: Secret
metadata:
  name: appliveview-values
  namespace: tap-install
stringData:
  values.yml: #@ yaml.encode(data.values.appliveview)

#@ end
#@ end
