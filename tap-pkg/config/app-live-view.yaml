#@ load("@ytt:data", "data")
#@ load("@ytt:yaml", "yaml")
#@ load("_profiles.star", "profiles")

#@ if profiles.is_any_enabled([profiles.full, profiles.dev_light]):

---
apiVersion: packaging.carvel.dev/v1alpha1
kind: PackageInstall
metadata:
  name: app-live-view
  namespace: tap-install
  annotations:
    kapp.k14s.io/change-rule: "upsert after upserting conventions"
spec:
  serviceAccountName: tap-install-sa
  packageRef:
    refName: appliveview.tanzu.vmware.com
    versionSelection:
      constraints: 0.3.0-build6
  values:
  - secretRef:
      name: app-live-view-values
---
apiVersion: v1
kind: Secret
metadata:
  name: app-live-view-values
  namespace: tap-install
stringData:
  values.yml: #@ yaml.encode(data.values.app_live_view)

#@ end
