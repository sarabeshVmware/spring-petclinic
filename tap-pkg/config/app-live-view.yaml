#@ load("@ytt:data", "data")
#@ load("@ytt:yaml", "yaml")
#@ load("_profiles.star", "profiles")

#@ if profiles.is_any_enabled([profiles.full, profiles.dev, profiles.run]):

---
apiVersion: packaging.carvel.dev/v1alpha1
kind: PackageInstall
metadata:
  name: appliveview
  namespace: tap-install
  annotations:
    kapp.k14s.io/change-rule: "upsert after upserting conventions"
spec:
  serviceAccountName: tap-install-sa
  packageRef:
    refName: appliveview.tanzu.vmware.com
    versionSelection:
      constraints: 0.4.0-build.1
      prereleases: {}
  values:
  - secretRef:
      name: appliveview-values
---
apiVersion: v1
kind: Secret
metadata:
  name: appliveview-values
  namespace: tap-install
stringData:
  values.yml: #@ yaml.encode(data.values.appliveview)

#@ end
