#@ load("@ytt:data", "data")
#@ load("@ytt:yaml", "yaml")
#@ load("_profiles.star", "profiles")

#@ if profiles.is_any_enabled([profiles.full, profiles.iterate, profiles.run]):
#@ if profiles.is_pkg_enabled("policy.signing.apps.tanzu.vmware.com"):

---
apiVersion: packaging.carvel.dev/v1alpha1
kind: PackageInstall
metadata:
  name: policy
  namespace: tap-install
  annotations:
    kapp.k14s.io/change-rule.cert-manager: "upsert after upserting cert-manager"
    kapp.k14s.io/change-rule.serviceaccount: "delete before deleting serviceaccount"
spec:
  serviceAccountName: tap-install-sa
  packageRef:
    refName: policy.signing.apps.tanzu.vmware.com
    versionSelection:
      constraints: 0.1.0-beta.11
      prereleases:
        identifiers: [beta]
  values:
  - secretRef:
      name: policy-values
---
apiVersion: v1
kind: Secret
metadata:
  name: policy-values
  namespace: tap-install
stringData:
  values.yaml: #@ yaml.encode(data.values.policy)

#@ end
#@ end
