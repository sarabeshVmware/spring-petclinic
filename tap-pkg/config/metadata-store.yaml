#@ load("@ytt:data", "data")
#@ load("@ytt:yaml", "yaml")
#@ load("_profiles.star", "profiles")

#@ if profiles.is_any_enabled([profiles.full, profiles.build]):
#@ if profiles.is_pkg_enabled("scst-store.tanzu.vmware.com"):

---
apiVersion: packaging.carvel.dev/v1alpha1
kind: PackageInstall
metadata:
  name: metadata-store
  namespace: tap-install
spec:
  serviceAccountName: tap-install-sa
  packageRef:
    refName: scst-store.tanzu.vmware.com
    versionSelection:
      constraints: 1.0.0-build.4
      prereleases: {}
  values:
  - secretRef:
      name: metadata-store-values
---
apiVersion: v1
kind: Secret
metadata:
  name: metadata-store-values
  namespace: tap-install
stringData:
  values.yaml: #@ yaml.encode(data.values.metadata_store)

#@ end
#@ end
