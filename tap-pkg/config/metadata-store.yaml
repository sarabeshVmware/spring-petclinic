#@ load("_profiles.star", "profiles")
#@ load("@ytt:data", "data")
#@ load("@ytt:yaml", "yaml")

#@ if profiles.is_any_enabled([profiles.full, profiles.build]):
#@ if profiles.is_pkg_enabled("metadata-store.apps.tanzu.vmware.com"):

---
apiVersion: packaging.carvel.dev/v1alpha1
kind: PackageInstall
metadata:
  name: metadata-store
  namespace: tap-install
  annotations:
    kapp.k14s.io/change-rule.cert-manager: "upsert after upserting cert-manager" 
    kapp.k14s.io/change-rule.serviceaccount: "delete before deleting serviceaccount"
spec:
  serviceAccountName: tap-install-sa
  packageRef:
    refName: metadata-store.apps.tanzu.vmware.com
    versionSelection:
      constraints: 1.0.2
  values:
  - secretRef:
      name: metadata-store-values
---
apiVersion: v1
kind: Secret
metadata:
  name: metadata-store-values
  namespace: tap-install
stringData:
  values.yaml: #@ yaml.encode(data.values.metadata_store)

#@ end
#@ end
