#@ load("@ytt:data", "data")
#@ load("@ytt:yaml", "yaml")
#@ load("_profiles.star", "profiles")

#@ if profiles.is_any_enabled([profiles.full, profiles.shared_tools]):

---
apiVersion: packaging.carvel.dev/v1alpha1
kind: PackageInstall
metadata:
  name: learningcenter
  namespace: tap-install
  annotations:
    kapp.k14s.io/change-group: learningcenter
spec:
  serviceAccountName: tap-install-sa
  packageRef:
    refName: learningcenter.tanzu.vmware.com
    versionSelection:
      constraints: 1.0.11-build.1
      prereleases: {}
  values:
  - secretRef:
      name: learningcenter-values
---
apiVersion: v1
kind: Secret
metadata:
  name: learningcenter-values
  namespace: tap-install
stringData:
  values.yaml: #@ yaml.encode(data.values.learningcenter)

#@ end
