#@ load("@ytt:data", "data")
#@ load("@ytt:yaml", "yaml")
#@ load("_profiles.star", "profiles")

#@ if profiles.is_any_enabled([profiles.full, profiles.shared_tools]):

---
apiVersion: packaging.carvel.dev/v1alpha1
kind: PackageInstall
metadata:
  name: app-accelerator
  namespace: tap-install
spec:
  serviceAccountName: tap-install-sa
  packageRef:
    refName: accelerator.apps.tanzu.vmware.com
    versionSelection:
      constraints: 0.3.0
      prereleases: {}
  values:
  - secretRef:
      name: app-accelerator-values
---
apiVersion: v1
kind: Secret
metadata:
  name: app-accelerator-values
  namespace: tap-install
stringData:
  values.yaml: #@ yaml.encode(data.values.app_accelerator)

#@ end
