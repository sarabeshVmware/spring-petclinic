#@ load("@ytt:data", "data")
#@ load("@ytt:yaml", "yaml")
#@ load("_profiles.star", "profiles")

#@ if profiles.is_any_enabled([profiles.full, profiles.dev]):

---
apiVersion: packaging.carvel.dev/v1alpha1
kind: PackageInstall
metadata:
  name: accelerator
  namespace: tap-install
spec:
  serviceAccountName: tap-install-sa
  packageRef:
    refName: accelerator.apps.tanzu.vmware.com
    versionSelection:
      constraints: 0.4.0
  values:
  - secretRef:
      name: accelerator-values
---
apiVersion: v1
kind: Secret
metadata:
  name: accelerator-values
  namespace: tap-install
stringData:
  values.yaml: #@ yaml.encode(data.values.accelerator)

#@ end
