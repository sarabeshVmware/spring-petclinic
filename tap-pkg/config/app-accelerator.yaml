#@ load("@ytt:data", "data")
#@ load("@ytt:yaml", "yaml")
#@ load("_profiles.star", "profiles")

#@ if profiles.is_any_enabled([profiles.full, profiles.light, profiles.view]):
#@ if profiles.is_pkg_enabled("accelerator.apps.tanzu.vmware.com"):

---
apiVersion: packaging.carvel.dev/v1alpha1
kind: PackageInstall
metadata:
  name: accelerator
  namespace: tap-install
  annotations: 
    kapp.k14s.io/change-rule.serviceaccount: "delete before deleting serviceaccount"
    kapp.k14s.io/change-rule.contour: "upsert after upserting contour"
spec:
  serviceAccountName: tap-install-sa
  packageRef:
    refName: accelerator.apps.tanzu.vmware.com
    versionSelection:
      constraints: 1.2.0-build.1
      prereleases: {}
  values:
  - secretRef:
      name: accelerator-values
---
apiVersion: v1
kind: Secret
metadata:
  name: accelerator-values
  namespace: tap-install
stringData:
  values.yaml: #@ yaml.encode(data.values.accelerator)

#@ end
#@ end
