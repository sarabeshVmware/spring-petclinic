#@ load("_profiles.star", "profiles")
#@ load("@ytt:data", "data")
#@ load("@ytt:yaml", "yaml")

#@ if profiles.is_any_enabled([profiles.full, profiles.build]):
#@ if profiles.is_pkg_enabled("scanning.apps.tanzu.vmware.com"):

---
apiVersion: packaging.carvel.dev/v1alpha1
kind: PackageInstall
metadata:
  name: scanning
  namespace: tap-install
  annotations:
    kapp.k14s.io/change-group: scancontroller
    kapp.k14s.io/change-rule: "delete before deleting serviceaccount"
spec:
  serviceAccountName: tap-install-sa
  packageRef:
    refName: scanning.apps.tanzu.vmware.com
    versionSelection:
      constraints: 1.2.1
      prereleases: {}
  values:
  - secretRef:
      name: scanning-values
---
apiVersion: v1
kind: Secret
metadata:
  name: scanning-values
  namespace: tap-install
stringData:
  values.yaml: #@ yaml.encode(data.values.scanning)

#@ end
#@ end
