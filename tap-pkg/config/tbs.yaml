#@ load("@ytt:data", "data")
#@ load("@ytt:yaml", "yaml")
#@ load("@ytt:struct", "struct")
#@ load("_profiles.star", "profiles")

#@ if profiles.is_any_enabled([profiles.full, profiles.dev_light]):
#@ buildservice_values = data.values.buildservice
#@ if profiles.is_any_enabled([profiles.dev_light]):
#@   buildservice_values = struct.decode(data.values.buildservice)
#@   buildservice_values["disable_smart_warmer"] = "true"
#@ end

---
apiVersion: packaging.carvel.dev/v1alpha1
kind: PackageInstall
metadata:
  name: buildservice
  namespace: tap-install
spec:
  serviceAccountName: tap-install-sa
  packageRef:
    refName: buildservice.tanzu.vmware.com
    versionSelection:
      constraints: 1.3.1
  values:
  - secretRef:
      name: buildservice-values
---
apiVersion: v1
kind: Secret
metadata:
  name: buildservice-values
  namespace: tap-install
stringData:
  values.yaml: #@ yaml.encode(buildservice_values)

#@ end
