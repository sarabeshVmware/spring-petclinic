#@ def default_values():
---
descriptor_name: tap-1.1-lite
#@ if/end profiles.is_any_enabled([profiles.light]):
disable_smart_warmer: true
#@ end

#@ def updated_values():
#@overlay/match by=overlay.all
#@overlay/match-child-defaults missing_ok=True
---
#@ if/end hasattr(data.values.buildservice, "descriptor_name"):
descriptor_name: #@ descriptor_mapping[data.values.buildservice.descriptor_name]
#@ end

---
apiVersion: packaging.carvel.dev/v1alpha1
kind: PackageInstall
metadata:
  name: buildservice
  namespace: tap-install
  annotations:
    kapp.k14s.io/change-rule: "delete before deleting serviceaccount"
spec:
  serviceAccountName: tap-install-sa
  packageRef:
    refName: buildservice.tanzu.vmware.com
    versionSelection:
      constraints: 1.4.3
  values:
  - secretRef:
      name: buildservice-values
---
apiVersion: v1
kind: Secret
metadata:
  name: buildservice-values
  namespace: tap-install
stringData:
  values.yaml: #@ yaml.encode(overlay.apply(default_values(), user_values(), updated_values()))

#@ end
#@ end
