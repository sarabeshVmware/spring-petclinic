#@ load("_profiles.star", "profiles")
#@ load("@ytt:data", "data")
#@ load("@ytt:yaml", "yaml")
#@ if profiles.is_any_enabled([profiles.full, profiles.light, profiles.iterate, profiles.build]):
#@ if profiles.is_pkg_enabled("tekton.tanzu.vmware.com"):

---
apiVersion: packaging.carvel.dev/v1alpha1
kind: PackageInstall
metadata:
  name: tekton-pipelines
  namespace: tap-install
  annotations:
    kapp.k14s.io/change-rule: "delete before deleting serviceaccount"
spec:
  serviceAccountName: tap-install-sa
  packageRef:
    refName: tekton.tanzu.vmware.com
    versionSelection:
      constraints: 0.35.1
  values:
  - secretRef:
      name: tekton-pipelines-values
---
apiVersion: v1
kind: Secret
metadata:
  name: tekton-pipelines-values
  namespace: tap-install
stringData:
  values.yaml: #@ yaml.encode(data.values.tekton_pipelines)

#@ end
#@ end
