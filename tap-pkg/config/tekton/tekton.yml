#@ load("@ytt:data", "data")
#@ load("@ytt:library", "library")
#@ load("@ytt:overlay", "overlay")
#@ load("@ytt:template", "template")
#@ load("/_profiles.star", "profiles")

#@ if data.values.install_tekton and profiles.is_any_enabled([profiles.full, profiles.operator_light]):

#@ def tekton_updates():
#@overlay/match by=overlay.subset({"kind": "Deployment"}),expects="1+"
---
spec:
  template:
    spec:
      #@overlay/match missing_ok=True
      imagePullSecrets:
      #@overlay/append
      - name: registry-creds

#@overlay/append
---
apiVersion: v1
kind: Secret
metadata:
  name: registry-creds
  namespace: tekton-pipelines
  annotations:
    secretgen.carvel.dev/image-pull-secret: ""
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: e30K
#@ end

--- #@ template.replace(overlay.apply(library.get("upstream").eval(), tekton_updates()))

#@ end
