---
apiVersion: packaging.carvel.dev/v1alpha1
kind: PackageInstall
metadata:
  name: cartographer
  namespace: tap-install
  annotations:
    kapp.k14s.io/change-group: cartographer
    kapp.k14s.io/change-rule.cert-manager: "upsert after upserting cert-manager"
    kapp.k14s.io/change-rule.serviceaccount: "delete before deleting serviceaccount"
spec:
  serviceAccountName: tap-install-sa
  packageRef:
    refName: cartographer.tanzu.vmware.com
    versionSelection:
      constraints: 0.4.0-build.3
      prereleases: {}
  values:
  - secretRef:
      name: cartographer-values
---
apiVersion: v1
kind: Secret
metadata:
  name: cartographer-values
  namespace: tap-install
stringData:
  values.yaml: #@ yaml.encode(collect_values())

#@ end
#@ end
