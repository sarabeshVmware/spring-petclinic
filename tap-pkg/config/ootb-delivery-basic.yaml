#@ load("@ytt:data", "data")
#@ load("@ytt:yaml", "yaml")
#@ load("_profiles.star", "profiles")

#@ if profiles.is_any_enabled([profiles.full, profiles.iterate, profiles.run]):
#@ if profiles.is_pkg_enabled("ootb-delivery-basic.tanzu.vmware.com"):

---
apiVersion: packaging.carvel.dev/v1alpha1
kind: PackageInstall
metadata:
  name: ootb-delivery-basic
  namespace: tap-install
  annotations:
    kapp.k14s.io/change-rule.cartographer: "upsert after upserting cartographer"
    kapp.k14s.io/change-rule.ootb-templates: "upsert after upserting ootb-templates"
    kapp.k14s.io/change-rule.serviceaccount: "delete before deleting serviceaccount"
spec:
  serviceAccountName: tap-install-sa
  packageRef:
    refName: ootb-delivery-basic.tanzu.vmware.com
    versionSelection:
      constraints: 0.6.1
  values:
  - secretRef:
      name: ootb-delivery-basic-values
---
apiVersion: v1
kind: Secret
metadata:
  name: ootb-delivery-basic-values
  namespace: tap-install
type: Opaque
stringData:
  values.yml: #@ yaml.encode(data.values.ootb_delivery_basic)

#@ end
#@ end
