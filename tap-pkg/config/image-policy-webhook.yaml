#@ load("@ytt:data", "data")
#@ load("@ytt:yaml", "yaml")
#@ load("_profiles.star", "profiles")

#@ if profiles.is_any_enabled([profiles.full, profiles.workspace, profiles.run]):
#@ if profiles.is_pkg_enabled("image-policy-webhook.signing.apps.tanzu.vmware.com"):

---
apiVersion: packaging.carvel.dev/v1alpha1
kind: PackageInstall
metadata:
  name: image-policy-webhook
  namespace: tap-install
  annotations:
    kapp.k14s.io/change-rule.cert-manager: "upsert after upserting cert-manager"
    kapp.k14s.io/change-rule.serviceaccount: "delete before deleting serviceaccount"
spec:
  serviceAccountName: tap-install-sa
  packageRef:
    refName: image-policy-webhook.signing.apps.tanzu.vmware.com
    versionSelection:
      constraints: 1.0.1
  values:
  - secretRef:
      name: image-policy-webhook-values
---
apiVersion: v1
kind: Secret
metadata:
  name: image-policy-webhook-values
  namespace: tap-install
stringData:
  values.yaml: #@ yaml.encode(data.values.image_policy_webhook)

#@ end
#@ end
