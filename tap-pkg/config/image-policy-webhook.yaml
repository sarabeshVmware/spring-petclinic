#@ load("@ytt:data", "data")
#@ load("@ytt:yaml", "yaml")
#@ load("_profiles.star", "profiles")

#@ if profiles.is_any_enabled([profiles.full, profiles.dev_light, profiles.operator_light]):

---
apiVersion: packaging.carvel.dev/v1alpha1
kind: PackageInstall
metadata:
  name: image-policy-webhook
  namespace: tap-install
spec:
  serviceAccountName: tap-install-sa
  packageRef:
    refName: image-policy-webhook.signing.run.tanzu.vmware.com
    versionSelection:
      constraints: 1.0.0-beta.0
      prereleases: {}
  values:
  - secretRef:
      name: image-policy-webhook-values
---
apiVersion: v1
kind: Secret
metadata:
  name: image-policy-webhook-values
  namespace: tap-install
stringData:
  values.yaml: #@ yaml.encode(data.values.image_policy_webhook)

#@ end
