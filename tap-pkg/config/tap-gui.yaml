#@ load("@ytt:data", "data")
#@ load("@ytt:yaml", "yaml")
#@ load("_profiles.star", "profiles")

#@ if profiles.is_any_enabled([profiles.full, profiles.shared_tools, profiles.dev_light]):

---
apiVersion: packaging.carvel.dev/v1alpha1
kind: PackageInstall
metadata:
  name: tap-gui
  namespace: tap-install
spec:
  serviceAccountName: tap-install-sa
  packageRef:
    refName: tap-gui.tanzu.vmware.com
    versionSelection:
      constraints: 0.3.0-rc.1
      prereleases: {}
  values:
  - secretRef:
      name: tap-gui-values
---
apiVersion: v1
kind: Secret
metadata:
  name: tap-gui-values
  namespace: tap-install
stringData:
  values.yaml: #@ yaml.encode(data.values.tap_gui)

#@ end
