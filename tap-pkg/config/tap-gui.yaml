#@ load("@ytt:data", "data")
#@ load("@ytt:yaml", "yaml")
#@ load("_profiles.star", "profiles")

#@ if profiles.is_any_enabled([profiles.full, profiles.light, profiles.view]):
#@ if profiles.is_pkg_enabled("tap-gui.tanzu.vmware.com"):

---
apiVersion: packaging.carvel.dev/v1alpha1
kind: PackageInstall
metadata:
  name: tap-gui
  namespace: tap-install
  annotations:
    kapp.k14s.io/change-rule.serviceaccount: "delete before deleting serviceaccount"
    kapp.k14s.io/change-rule.contour: "upsert after upserting contour"
spec:
  serviceAccountName: tap-install-sa
  packageRef:
    refName: tap-gui.tanzu.vmware.com
    versionSelection:
      constraints: 1.1.0-rc.44
      prereleases: {}
  values:
  - secretRef:
      name: tap-gui-values
---
apiVersion: v1
kind: Secret
metadata:
  name: tap-gui-values
  namespace: tap-install
stringData:
  values.yaml: #@ yaml.encode(profiles.merge_ingress_values(data.values.tap_gui, data.values))

#@ end
#@ end
