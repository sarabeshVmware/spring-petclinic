#@ load("@ytt:data", "data")
#@ load("@ytt:yaml", "yaml")
#@ load("_profiles.star", "profiles")

#@ if profiles.is_any_enabled([profiles.full, profiles.dev]):
#@ if profiles.is_pkg_enabled("tap-gui.tanzu.vmware.com"):

---
apiVersion: packaging.carvel.dev/v1alpha1
kind: PackageInstall
metadata:
  name: tap-gui
  namespace: tap-install
  annotations: 
    kapp.k14s.io/change-rule: "delete before deleting serviceaccount"
spec:
  serviceAccountName: tap-install-sa
  packageRef:
    refName: tap-gui.tanzu.vmware.com
    versionSelection:
      constraints: 0.3.0
  values:
  - secretRef:
      name: tap-gui-values
---
apiVersion: v1
kind: Secret
metadata:
  name: tap-gui-values
  namespace: tap-install
stringData:
  values.yaml: #@ yaml.encode(data.values.tap_gui)

#@ end
#@ end
