#@ load("@ytt:data", "data")
#@ load("@ytt:yaml", "yaml")
#@ load("_profiles.star", "profiles")

#@ if profiles.is_any_enabled([profiles.full, profiles.light, profiles.iterate, profiles.build, profiles.run]):
#@ if profiles.is_pkg_enabled("controller.source.apps.tanzu.vmware.com"):

---
apiVersion: packaging.carvel.dev/v1alpha1
kind: PackageInstall
metadata:
  name: source-controller
  namespace: tap-install
  annotations: 
    kapp.k14s.io/change-rule: "delete before deleting serviceaccount"
spec:
  serviceAccountName: tap-install-sa
  packageRef:
    refName: controller.source.apps.tanzu.vmware.com
    versionSelection:
      constraints: 0.3.2
  values:
  - secretRef:
      name: source-controller-values
---
apiVersion: v1
kind: Secret
metadata:
  name: source-controller-values
  namespace: tap-install
stringData:
  values.yaml: #@ yaml.encode(data.values.source_controller)

#@ end
#@ end
