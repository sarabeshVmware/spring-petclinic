                      type: boolean
                generators:
                  description: Techdocs generator information
                  type: object
                  required:
                  - techdocs
                  properties:
                    techdocs:
                      enum:
                      - docker
                      - local
                      type: string
                publisher:
                  description: Techdocs publisher information
                  anyOf:
                  - type: object
                    properties:
