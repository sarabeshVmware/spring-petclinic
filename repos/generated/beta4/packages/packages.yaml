                        required:
                        - bucketName
                        properties:
                          credentials:
                            description: |-
                              (Optional) Credentials used to access a storage bucket.
                              If not set, environment variables or aws config file will be used to authenticate.
                            visibility: secret
                            type: object
                            required:
                            - accessKeyId
                            - secretAccessKey
                            properties:
                              accessKeyId:
                                description: User access key id
                                visibility: secret
                                type: string
                              secretAccessKey:
                                description: User secret access key
                                visibility: secret
                                type: string
                              roleArn:
                                description: ARN of role to be assumed
                                visibility: backend
                                type: string
                          bucketName:
                            description: (Required) Cloud Storage Bucket Name
                            visibility: backend
                            type: string
                          region:
                            description: |-
                              (Optional) AWS Region.
                              If not set, AWS_REGION environment variable or aws config file will be used.
                            visibility: secret
                            type: string
                          endpoint:
                            description: |-
                              (Optional) AWS Endpoint.
                              The endpoint URI to send requests to. The default endpoint is built from the configured region.
                            visibility: secret
