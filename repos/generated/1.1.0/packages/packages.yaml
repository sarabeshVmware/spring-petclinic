          - '"200Mi"(200 mebibytes)'
          - '"200M" (200 megabytes)'
          - '"200m" (0.2 bytes)'
        requests_cpu:
          type: string
          description: |
            The CPU request defines the minimum CPU time for the Image Policy Webhook controller manager.
            During CPU contention, CPU request is used as a weighting where higher CPU requests are
            allocated more CPU time.
            https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/#meaning-of-cpu
          default: 100m
          examples:
          - '"1.0" or "1000m"'
          - '"0.5" or "500m"'
        requests_memory:
          type: string
          description: |
