                          - config
                        clusters:
                          type: array
                          items:
                            type: object
                            required:
                            - authProvider
                            - name
                            - url
                            properties:
                              url:
                                visibility: frontend
                                type: string
                              name:
                                visibility: frontend
                                type: string
                              serviceAccountToken:
                                visibility: secret
                                type: string
                              authProvider:
                                visibility: frontend
                                enum:
                                - aws
                                - google
                                - serviceAccount
                                type: string
                              skipTLSVerify:
                                visibility: frontend
                                type: boolean
                      required:
                      - clusters
                      - type
                customResources:
                  type: array
                  items:
                    type: object
                    required:
                    - apiVersion
                    - group
                    - plural
                    properties:
                      group:
                        type: string
                      apiVersion:
                        type: string
                      plural:
                        type: string
            proxy:
              description: |-
                A list of forwarding-proxies. Each key is a route to match,
                below the prefix that the proxy plugin is mounted on. It must
                start with a '/'.
              type: object
              additionalProperties:
                anyOf:
                - type: object
                  properties:
                    target:
                      description: Target of the proxy. Url string to be parsed with the url module.
                      type: string
                    headers:
                      description: Object with extra headers to be added to target requests.
                      type: object
                      additionalProperties:
                        type: string
                    changeOrigin:
                      description: 'Changes the origin of the host header to the target URL. Default: true.'
                      type: boolean
                    pathRewrite:
                      description: |-
                        Rewrite target's url path. Object-keys will be used as RegExp to match paths.
                        If pathRewrite is not specified, it is set to a single rewrite that removes the entire prefix and route.
                      type: object
                      additionalProperties:
                        type: string
                    allowedMethods:
                      description: 'Limit the forwarded HTTP methods, for example allowedMethods: [''GET''] to enforce read-only access.'
                      type: array
                      items:
                        type: string
                    allowedHeaders:
                      description: |-
                        Limit the forwarded HTTP methods. By default, only the headers that are considered safe for CORS
                        and headers that are set by the proxy will be forwarded.
                      type: array
                      items:
                        type: string
                  required:
                  - target
                - type: string
            scaffolder:
              description: Configuration options for the scaffolder plugin
              type: object
              properties:
                defaultAuthor:
                  description: The commit author info used when new components are created.
                  type: object
                  properties:
                    name:
                      type: string
                    email:
                      type: string
                defaultCommitMessage:
                  description: The commit message used when new components are created.
                  type: string
                github:
                  type: object
                  additionalProperties:
                    type: string
                  properties:
                    visibility:
                      description: The visibility to set on created repositories.
                      enum:
                      - internal
                      - private
                      - public
                      type: string
                gitlab:
                  type: object
                  required:
                  - api
                  properties:
                    api:
                      type: object
                      additionalProperties:
                        type: string
                    visibility:
                      description: The visibility to set on created repositories.
                      enum:
                      - internal
                      - private
                      - public
                      type: string
                azure:
                  type: object
                  required:
                  - api
                  - baseUrl
                  properties:
                    baseUrl:
                      type: string
                    api:
                      type: object
                      additionalProperties:
                        type: string
                bitbucket:
                  type: object
                  required:
                  - api
                  properties:
                    api:
                      type: object
                      additionalProperties:
                        type: string
                    visibility:
                      description: The visibility to set on created repositories.
                      enum:
                      - private
                      - public
                      type: string
          description: This is the schema describing the structure of the app-config.yaml configuration file.
  licenses:
  - VMware Proprietary
  template:
    spec:
      fetch:
      - imgpkgBundle:
          image: dev.registry.tanzu.vmware.com/tap-gui/bundle:1.0.1
      template:
      - ytt:
          paths:
          - config/
      - kbld:
          paths:
          - '-'
          - .imgpkg/images.yml
      deploy:
      - kapp: {}
---
apiVersion: data.packaging.carvel.dev/v1alpha1
kind: Package
metadata:
  name: tap-gui.tanzu.vmware.com.1.0.2
spec:
  refName: tap-gui.tanzu.vmware.com
  version: 1.0.2
  releasedAt: "2022-01-25T01:57:19Z"
  releaseNotes: Bugfixes and copy updates
  capacityRequirementsDescription: |
    Minimal. Tanzu Application Platform GUI has been observed consuming <1 CPU
    and ~150MB memory in test environments.
  valuesSchema:
    openAPIv3:
      title: Tanzu Application Platform GUI Configuration Schema
      description: |
        This is the schema describing the structure of the Tanzu Application
        Platform GUI config, including the structure of the Backstage
        app-config.yml file.
      properties:
        namespace:
          type: string
          description: |
            Namespace in which the Tanzu Application Platform GUI workloads will
            be applied. This namespace will be created as part of the deploy.
        service_type:
          type: string
          description: |
            the type for the Kubernetes Service which exposes Backstage. Common
            values are "ClusterIP", "NodePort" and "LoadBalancer".
        ingressEnabled:
          type: boolean
          description: |
            Flag for whether or not to create an HTTPProxy for ingress.
        ingressDomain:
          type: string
          description: |
            Domain to be used by the HTTPProxy ingress object. The "tap-gui"
            subdomain will be prepended to the value provided. For example:
            "example.com" would become "tap-gui.example.com".
        tls:
          type: object
          description: |
            Object for specifying TLS certificate delegation.
          properties:
            namespace:
              type: string
              description: |
                The targeted namespace for secret consumption by the HTTPProxy.
            secretName:
              type: string
              description: |
                The name of secret for consumption by the HTTPProxy.
        app_config:
          $schema: https://backstage.io/schema/config-v1
          title: Application Configuration Schema
          type: object
          definitions:
            LoginPageConfig:
              type: object
              properties:
                id:
                  visibility: frontend
                  type: string
                title:
                  visibility: frontend
                  type: string
                message:
                  visibility: frontend
                  type: string
          required:
          - app
          - backend
          - techdocs
          properties:
            app:
              type: object
              required:
              - baseUrl
              description: Generic frontend configuration.
              properties:
                baseUrl:
                  type: string
                  visibility: frontend
                  description: The public absolute root URL that the frontend.
                title:
                  type: string
                  visibility: frontend
                  description: The title of the app, as shown in the Backstage web interface.
                googleAnalyticsTrackingId:
                  type: string
                  visibility: frontend
                  description: Tracking ID for Google Analytics
                  examples:
                  - UA-000000-0
                datadogRum:
                  type: object
                  description: Datadog RUM events configuration
                  required:
                  - clientToken
                  - applicationId
                  properties:
                    env:
                      type: string
                      visibility: frontend
                      description: Environment for Datadog RUM events
                    clientToken:
                      type: string
                      visibility: frontend
                      description: clientToken for Datadog RUM events
                    applicationId:
                      type: string
                      visibility: frontend
                      description: applicationId for Datadog RUM events
                    site:
                      type: string
                      visibility: frontend
                      description: site for Datadog RUM events
                listen:
                  type: object
                  description: Listening configuration for local development
                  properties:
                    host:
                      type: string
                      visibility: frontend
                      description: The host that the frontend should be bound to. Only used for local development.
                    port:
                      type: number
                      visibility: frontend
                      description: The port that the frontend should be bound to. Only used for local development.
                support:
                  description: Information about support of this Backstage instance and how to contact the integrator team.
                  type: object
                  required:
                  - items
                  - url
                  properties:
                    url:
                      description: The primary support url.
                      visibility: frontend
                      type: string
                    items:
                      description: A list of categorized support item groupings.
                      type: array
                      items:
                        type: object
                        required:
                        - links
                        - title
                        properties:
                          title:
                            description: The title of the support item grouping.
                            visibility: frontend
                            type: string
                          icon:
                            description: An optional icon for the support item grouping.
                            visibility: frontend
                            type: string
                          links:
                            description: A list of support links for the Backstage instance inside this grouping.
                            type: array
                            items:
                              type: object
                              required:
                              - url
                              properties:
                                url:
                                  visibility: frontend
                                  type: string
                                title:
                                  visibility: frontend
                                  type: string
            auth:
              type: object
              description: Configuration options for the auth plugin
              properties:
                providers:
                  type: object
                  description: The available auth-provider options and attributes
                  additionalProperties:
                    type: object
                    visibility: frontend
                  properties:
                    google:
                      type: object
                      additionalProperties:
                        type: object
                        additionalProperties:
                          type: string
                    github:
                      type: object
                      additionalProperties:
                        type: object
                        additionalProperties:
                          type: string
                    gitlab:
                      type: object
                      additionalProperties:
                        type: object
                        additionalProperties:
                          type: string
                    saml:
                      type: object
                      required:
                      - cert
                      - entryPoint
                      - issuer
                      properties:
                        entryPoint:
                          type: string
                        logoutUrl:
                          type: string
                        issuer:
                          type: string
                        cert:
                          type: string
                        privateKey:
                          type: string
                        authnContext:
                          type: array
                          items:
                            type: string
                        identifierFormat:
                          type: string
                        decryptionPvk:
                          type: string
                        signatureAlgorithm:
                          enum:
                          - sha256
                          - sha512
                          type: string
                        digestAlgorithm:
                          type: string
                        acceptedClockSkewMs:
                          type: number
                    okta:
                      type: object
                      additionalProperties:
                        type: object
                        additionalProperties:
                          type: string
                    oauth2:
                      type: object
                      additionalProperties:
                        type: object
                        required:
                        - authorizationUrl
                        - clientId
                        - clientSecret
                        - tokenUrl
                        properties:
                          clientId:
                            type: string
                          clientSecret:
                            type: string
                          authorizationUrl:
                            type: string
                          tokenUrl:
                            type: string
                          scope:
                            type: string
                          disableRefresh:
                            type: boolean
                    oidc:
                      type: object
                      additionalProperties:
                        type: object
                        additionalProperties:
                          type: string
                    auth0:
                      type: object
                      additionalProperties:
                        type: object
                        additionalProperties:
                          type: string
                    microsoft:
                      type: object
                      additionalProperties:
                        type: object
                        additionalProperties:
                          type: string
                    onelogin:
                      type: object
                      additionalProperties:
                        type: object
                        additionalProperties:
                          type: string
                    awsalb:
                      type: object
                      required:
                      - region
                      properties:
                        issuer:
                          type: string
                        region:
                          type: string
                allowGuestAccess:
                  visibility: frontend
                  type: boolean
                loginPage:
                  type: object
                  properties:
                    auth0:
                      $ref: '#/definitions/LoginPageConfig'
                    bitbucket:
                      $ref: '#/definitions/LoginPageConfig'
                    github:
                      $ref: '#/definitions/LoginPageConfig'
                    gitlab:
                      $ref: '#/definitions/LoginPageConfig'
                    google:
                      $ref: '#/definitions/LoginPageConfig'
                    oidc:
                      $ref: '#/definitions/LoginPageConfig'
                    okta:
                      $ref: '#/definitions/LoginPageConfig'
                    onelogin:
                      $ref: '#/definitions/LoginPageConfig'
                    microsoft:
                      $ref: '#/definitions/LoginPageConfig'
                environment:
                  description: The 'environment' attribute
                  visibility: frontend
                  type: string
                session:
                  type: object
                  properties:
                    secret:
                      description: The secret attribute of session object.
                      visibility: secret
                      type: string
                keyStore:
                  description: To control how to store JWK data in auth-backend
                  type: object
                  properties:
                    provider:
                      enum:
                      - database
                      - firestore
                      - memory
                      type: string
                    firestore:
                      type: object
                      properties:
                        host:
                          description: The host to connect to
                          type: string
                        port:
                          description: The port to connect to
                          type: number
                        ssl:
                          description: Whether to use SSL when connecting.
                          type: boolean
                        projectId:
                          description: The Google Cloud Project ID
                          type: string
                        keyFilename:
                          description: |-
                            Local file containing the Service Account credentials.
                            You can omit this value to automatically read from
                            GOOGLE_APPLICATION_CREDENTIALS env which is useful for local
                            development.
                          type: string
                        path:
                          description: The path to use for the collection. Defaults to 'sessions'
                          type: string
                        timeout:
                          description: Timeout used for database operations. Defaults to 10000ms
                          type: number
            backend:
              type: object
              required:
              - baseUrl
              - database
              - listen
              description: Generic backend configuration.
              properties:
                baseUrl:
                  type: string
                  description: The public absolute root URL that the backend is reachable at, from the browser's perspective.
                  visibility: frontend
                listen:
                  description: Address that the backend should listen to.
                  anyOf:
                  - type: object
                    properties:
                      address:
                        description: Address of the interface that the backend should bind to.
                        type: string
                      port:
                        description: Port that the backend should listen to.
                        type:
                        - string
                        - number
                  - type: string
                https:
                  description: |-
                    HTTPS configuration for the backend. If omitted the backend will serve HTTP.

                    Setting this to `true` will cause self-signed certificates to be generated, which
                    can be useful for local development or other non-production scenarios.
                  anyOf:
                  - type: object
                    properties:
                      certificate:
                        description: Certificate configuration
                        type: object
                        required:
                        - cert
                        - key
                        properties:
                          cert:
                            description: PEM encoded certificate. Use $file to load in a file
                            type: string
                          key:
                            description: PEM encoded certificate key. Use $file to load in a file.
                            visibility: secret
                            type: string
                  - enum:
                    - true
                    type: boolean
                database:
                  description: Database connection configuration, select base database type using the `client` field
                  type: object
                  required:
                  - client
                  - connection
                  properties:
                    client:
                      description: Default database client to use
                      enum:
                      - pg
                      - sqlite3
                      type: string
                    connection:
                      description: Base database connection string or Knex object
                      anyOf:
                      - type: object
                        properties: {}
                        additionalProperties: true
                      - type: string
                    prefix:
                      description: Database name prefix override
                      type: string
                    ensureExists:
                      description: |-
                        Whether to ensure the given database exists by creating it if it does not.
                        Defaults to true if unspecified.
                      type: boolean
                    plugin:
                      description: Plugin specific database configuration and client override
                      type: object
                      additionalProperties:
                        type: object
                        properties:
                          client:
                            description: Database client override
                            enum:
                            - pg
                            - sqlite3
                            type: string
                          connection:
                            description: Database connection string or Knex object override
                            anyOf:
                            - type: object
                              properties: {}
                              additionalProperties: true
                            - type: string
                          ensureExists:
                            description: |-
                              Whether to ensure the given database exists by creating it if it does not.
                              Defaults to base config if unspecified.
                            type: boolean
                cache:
                  description: Cache connection configuration, select cache type using the `store` field
                  anyOf:
                  - type: object
                    properties:
                      store:
                        type: string
                        enum:
                        - memory
                    required:
                    - store
                  - type: object
                    properties:
                      store:
                        type: string
                        enum:
                        - memcache
                      connection:
                        description: A memcache connection string in the form `user:pass@host:port`.
                        type: string
                    required:
                    - connection
                    - store
                cors:
                  type: object
                  properties:
                    origin:
                      anyOf:
                      - type: array
                        items:
                          type: string
                      - type: string
                    methods:
                      anyOf:
                      - type: array
                        items:
                          type: string
                      - type: string
                    allowedHeaders:
                      anyOf:
                      - type: array
                        items:
                          type: string
                      - type: string
                    exposedHeaders:
                      anyOf:
                      - type: array
                        items:
                          type: string
                      - type: string
                    credentials:
                      type: boolean
                    maxAge:
                      type: number
                    preflightContinue:
                      type: boolean
                    optionsSuccessStatus:
                      type: number
                reading:
                  description: |-
                    Configuration related to URL reading, used for example for reading catalog info
                    files, scaffolder templates, and techdocs content.
                  type: object
                  properties:
                    allow:
                      description: |-
                        A list of targets to allow outgoing requests to. Users will be able to make
                        requests on behalf of the backend to the targets that are allowed by this list.
                      type: array
                      items:
                        type: object
                        required:
                        - host
                        properties:
                          host:
                            description: |-
                              A host to allow outgoing requests to, being either a full host or
                              a subdomain wildcard pattern with a leading `*`. For example `example.com`
                              and `*.example.com` are valid values, `prod.*.example.com` is not.
                              The host may also contain a port, for example `example.com:8080`.
                            type: string
                csp:
                  description: |-
                    Content Security Policy options.

                    The keys are the plain policy ID, e.g. "upgrade-insecure-requests". The
                    values are on the format that the helmet library expects them, as an
                    array of strings. There is also the special value false, which means to
                    remove the default value that Backstage puts in place for that policy.
                  type: object
                  additionalProperties:
                    anyOf:
                    - type: array
                      items:
                        type: string
                    - enum:
                      - false
                      type: boolean
            integrations:
              description: Configuration for integrations towards various external repository provider systems
              type: object
              properties:
                azure:
                  description: Integration configuration for Azure
                  type: array
                  items:
                    type: object
                    required:
                    - host
                    properties:
                      host:
                        description: The hostname of the given Azure instance
                        visibility: frontend
                        type: string
                      token:
                        description: Token used to authenticate requests.
                        visibility: secret
                        type: string
                bitbucket:
                  description: Integration configuration for Bitbucket
                  type: array
                  items:
                    type: object
                    required:
                    - host
                    properties:
                      host:
                        description: The hostname of the given Bitbucket instance
                        visibility: frontend
                        type: string
                      token:
                        description: Token used to authenticate requests.
                        visibility: secret
                        type: string
                      apiBaseUrl:
                        description: The base url for the Bitbucket API, for example https://api.bitbucket.org/2.0
                        visibility: frontend
                        type: string
                      username:
                        description: The username to use for authenticated requests.
                        visibility: secret
                        type: string
                      appPassword:
                        description: Bitbucket app password used to authenticate requests.
                        visibility: secret
                        type: string
                github:
                  description: Integration configuration for GitHub
                  type: array
                  items:
                    type: object
                    required:
                    - host
                    properties:
                      host:
                        description: The hostname of the given GitHub instance
                        visibility: frontend
                        type: string
                      token:
                        description: Token used to authenticate requests.
                        visibility: secret
                        type: string
                      apiBaseUrl:
                        description: The base url for the GitHub API, for example https://api.github.com
                        visibility: frontend
                        type: string
                      rawBaseUrl:
                        description: The base url for GitHub raw resources, for example https://raw.githubusercontent.com
                        visibility: frontend
                        type: string
                      apps:
                        description: GitHub Apps configuration
                        visibility: backend
                        type: array
                        items:
                          type: object
                          required:
                          - appId
                          - clientId
                          - clientSecret
                          - privateKey
                          - webhookSecret
                          properties:
                            appId:
                              description: The numeric GitHub App ID, string for environment variables
                              type:
                              - string
                              - number
                            privateKey:
                              description: The private key to use for auth against the app
                              visibility: secret
                              type: string
                            webhookSecret:
                              description: The secret used for webhooks
                              visibility: secret
                              type: string
                            clientId:
                              description: The client ID to use
                              type: string
                            clientSecret:
                              description: The client secret to use
                              visibility: secret
                              type: string
                gitlab:
                  description: Integration configuration for GitLab
                  type: array
                  items:
                    type: object
                    required:
                    - host
                    properties:
                      host:
                        description: The host of the target that this matches on, e.g. "gitlab.com".
                        visibility: frontend
                        type: string
                      apiBaseUrl:
                        description: |-
                          The base URL of the API of this provider, e.g.
                          "https://gitlab.com/api/v4", with no trailing slash.

                          May be omitted specifically for public GitLab; then it will be deduced.
                        visibility: frontend
                        type: string
                      token:
                        description: |-
                          The authorization token to use for requests to this provider.

                          If no token is specified, anonymous access is used.
                        visibility: secret
                        type: string
                      baseUrl:
                        description: |-
                          The baseUrl of this provider, e.g. "https://gitlab.com", which is
                          passed into the GitLab client.

                          If no baseUrl is provided, it will default to https://${host}.
                        visibility: frontend
                        type: string
                googleGcs:
                  description: Integration configuration for Google Cloud Storage
                  type: object
                  properties:
                    clientEmail:
                      description: Service account email used to authenticate requests.
                      visibility: backend
                      type: string
                    privateKey:
                      description: Service account private key used to authenticate requests.
                      visibility: secret
                      type: string
                awsS3:
                  description: Integration configuration for AWS S3 Service
                  type: array
                  items:
                    type: object
                    required:
                    - host
                    properties:
                      host:
                        description: The host of the target that this matches on, e.g. "amazonaws.com".
                        visibility: frontend
                        type: string
                      accessKeyId:
                        description: Account access key used to authenticate requests.
                        visibility: backend
                        type: string
                      secretAccessKey:
                        description: Account secret key used to authenticate requests.
                        visibility: secret
                        type: string
                      roleArn:
                        description: ARN of the role to be assumed
                        visibility: backend
                        type: string
            catalog:
              description: Configuration options for the catalog plugin.
              type: object
              properties:
                rules:
                  description: |-
                    Rules to apply to all catalog entities, from any location.

                    An undefined list of matchers means match all, an empty list of
                    matchers means match none.

                    This is commonly used to put in what amounts to a whitelist of kinds
                    that regular users of Backstage are permitted to register locations
                    for. This can be used to stop them from registering yaml files
                    describing for example a Group entity called "admin" that they make
                    themselves members of, or similar.
                  type: array
                  items:
                    type: object
                    required:
                    - allow
                    properties:
                      allow:
                        description: |-
                          Allow entities of these particular kinds.

                          E.g. ["Component", "API", "Template", "Location"]
                        type: array
                        items:
                          type: string
                readonly:
                  description: |-
                    Readonly defines whether the catalog allows writes after startup.

                    Setting 'readonly=false' allows users to register their own components.
                    This is the default value.

                    Setting 'readonly=true' configures catalog to only allow reads. This can
                    be used in combination with static locations to only serve operator
                    provided locations. Effectively this removes the ability to register new
                    components to a running backstage instance.
                  type: boolean
                locations:
                  description: |-
                    A set of static locations that the catalog shall always keep itself
                    up-to-date with. This is commonly used for large, permanent integrations
                    that are defined by the Backstage operators at an organization, rather
                    than individual things that users register dynamically.

                    These have (optional) rules of their own. These override what the global
                    rules above specify. This way, you can prevent everybody from register
                    e.g. User and Group entities, except for one or a few static locations
                    that have those two kinds explicitly allowed.

                    For example:

                    ```yaml
                    rules:
                      - allow: [Component, API, Template, Location]
                    locations:
                      - type: url
                        target: https://github.com/org/repo/blob/master/users.yaml
                        rules:
                          - allow: [User, Group]
                      - type: url
                        target: https://github.com/org/repo/blob/master/systems.yaml
                        rules:
                          - allow: [System]
                    ```
                  type: array
                  items:
                    type: object
                    required:
                    - target
                    - type
                    properties:
                      type:
                        description: The type of location, e.g. "url".
                        type: string
                      target:
                        description: |-
                          The target URL of the location, e.g.
                          "https://github.com/org/repo/blob/master/users.yaml".
                        type: string
                      rules:
                        description: |-
                          Optional extra rules that apply to this particular location.

                          These override the global rules above.
                        type: array
                        items:
                          type: object
                          required:
                          - allow
                          properties:
                            allow:
                              description: |-
                                Allow entities of these particular kinds.

                                E.g. ["Group", "User"]
                              type: array
                              items:
                                type: string
                processors:
                  description: List of processor-specific options and attributes
                  type: object
                  properties:
                    githubOrg:
                      description: GithubOrgReaderProcessor configuration
                      type: object
                      required:
                      - providers
                      properties:
                        providers:
                          description: The configuration parameters for each single GitHub org provider.
                          type: array
                          items:
                            type: object
                            required:
                            - target
                            properties:
                              target:
                                description: |-
                                  The prefix of the target that this matches on, e.g.
                                  "https://github.com", with no trailing slash.
                                type: string
                              apiBaseUrl:
                                description: |-
                                  The base URL of the API of this provider, e.g.
                                  "https://api.github.com", with no trailing slash.

                                  May be omitted specifically for GitHub; then it will be deduced.
                                type: string
                              token:
                                description: |-
                                  The authorization token to use for requests to this provider.

                                  If no token is specified, anonymous access is used.
                                visibility: secret
                                type: string
                    githubMultiOrg:
                      description: GithubMultiOrgReaderProcessor configuration
                      type: object
                      required:
                      - orgs
                      properties:
                        orgs:
                          description: The configuration parameters for each GitHub org to process.
                          type: array
                          items:
                            type: object
                            required:
                            - name
                            properties:
                              name:
                                description: The name of the GitHub org to process.
                                type: string
                              groupNamespace:
                                description: |-
                                  The namespace of the group created for this org.

                                  Defaults to org name if omitted.
                                type: string
                              userNamespace:
                                description: |-
                                  The namespace of the users created from this org.

                                  Defaults to empty string if omitted.
                                type: string
                    awsOrganization:
                      description: AwsOrganizationCloudAccountProcessor configuration
                      type: object
                      required:
                      - provider
                      properties:
                        provider:
                          type: object
                          properties:
                            roleArn:
                              description: The role to be assumed by this processor
                              type: string
            kubernetes:
              type: object
              required:
              - clusterLocatorMethods
              - serviceLocatorMethod
              properties:
                objectTypes:
                  type: array
                  items:
                    enum:
                    - configmaps
                    - deployments
                    - horizontalpodautoscalers
                    - ingresses
                    - pods
                    - replicasets
                    - services
                    type: string
                serviceLocatorMethod:
                  type: object
                  required:
                  - type
                  properties:
                    type:
                      type: string
                      enum:
                      - multiTenant
                clusterLocatorMethods:
                  type: array
                  items:
                    anyOf:
                    - type: object
                      properties:
                        type:
                          visibility: frontend
                          type: string
                          enum:
                          - gke
                        projectId:
                          visibility: frontend
                          type: string
                        region:
                          visibility: frontend
                          type: string
                        skipTLSVerify:
                          visibility: frontend
                          type: boolean
                      required:
                      - projectId
                      - type
                    - type: object
                      properties:
                        type:
                          visibility: frontend
                          type: string
                          enum:
                          - config
                        clusters:
                          type: array
                          items:
                            type: object
                            required:
                            - authProvider
                            - name
                            - url
                            properties:
                              url:
                                visibility: frontend
                                type: string
                              name:
                                visibility: frontend
                                type: string
                              serviceAccountToken:
                                visibility: secret
                                type: string
                              authProvider:
                                visibility: frontend
                                enum:
                                - aws
                                - google
                                - serviceAccount
                                type: string
                              skipTLSVerify:
                                visibility: frontend
                                type: boolean
                      required:
                      - clusters
                      - type
                customResources:
                  type: array
                  items:
                    type: object
                    required:
                    - apiVersion
                    - group
                    - plural
                    properties:
                      group:
                        type: string
                      apiVersion:
                        type: string
                      plural:
                        type: string
            scaffolder:
              description: Configuration options for the scaffolder plugin
              type: object
              properties:
                defaultAuthor:
                  description: The commit author info used when new components are created.
                  type: object
                  properties:
                    name:
                      type: string
                    email:
                      type: string
                defaultCommitMessage:
                  description: The commit message used when new components are created.
                  type: string
                github:
                  type: object
                  additionalProperties:
                    type: string
                  properties:
                    visibility:
                      description: The visibility to set on created repositories.
                      enum:
                      - internal
                      - private
                      - public
                      type: string
                gitlab:
                  type: object
                  required:
                  - api
                  properties:
                    api:
                      type: object
                      additionalProperties:
                        type: string
                    visibility:
                      description: The visibility to set on created repositories.
                      enum:
                      - internal
                      - private
                      - public
                      type: string
                azure:
                  type: object
                  required:
                  - api
                  - baseUrl
                  properties:
                    baseUrl:
                      type: string
                    api:
                      type: object
                      additionalProperties:
                        type: string
                bitbucket:
                  type: object
                  required:
                  - api
                  properties:
                    api:
                      type: object
                      additionalProperties:
                        type: string
                    visibility:
                      description: The visibility to set on created repositories.
                      enum:
                      - private
                      - public
                      type: string
            techdocs:
              description: Configuration options for the techdocs-backend plugin
              type: object
              required:
              - builder
              properties:
                builder:
                  description: Documentation building process depends on the builder attr
                  visibility: frontend
                  enum:
                  - external
                  - local
                  type: string
                generator:
                  description: Techdocs generator information
                  type: object
                  required:
                  - runIn
                  properties:
                    runIn:
                      description: Where to run the techdocs (mkdocs) generator
                      enum:
                      - docker
                      - local
                      type: string
                    dockerImage:
                      description: Override the default techdocs docker image
                      type: string
                    pullImage:
                      description: Pull the latest docker image
                      type: boolean
                generators:
                  description: Techdocs generator information
                  type: object
                  required:
                  - techdocs
                  properties:
                    techdocs:
                      enum:
                      - docker
                      - local
                      type: string
                publisher:
                  description: Techdocs publisher information
                  anyOf:
                  - type: object
                    properties:
                      type:
                        type: string
                        enum:
                        - local
                    required:
                    - type
                  - type: object
                    properties:
                      type:
                        type: string
                        enum:
                        - awsS3
                      awsS3:
                        description: Required when 'type' is set to awsS3
                        type: object
                        required:
                        - bucketName
                        properties:
                          credentials:
                            description: |-
                              (Optional) Credentials used to access a storage bucket.
                              If not set, environment variables or aws config file will be used to authenticate.
                            visibility: secret
                            type: object
                            properties:
                              accessKeyId:
                                description: User access key id
                                visibility: secret
                                type: string
                              secretAccessKey:
                                description: User secret access key
                                visibility: secret
                                type: string
                              roleArn:
                                description: ARN of role to be assumed
                                visibility: backend
                                type: string
                          bucketName:
                            description: (Required) Cloud Storage Bucket Name
                            visibility: backend
                            type: string
                          region:
                            description: |-
                              (Optional) AWS Region.
                              If not set, AWS_REGION environment variable or aws config file will be used.
                            visibility: secret
                            type: string
                          endpoint:
                            description: |-
                              (Optional) AWS Endpoint.
                              The endpoint URI to send requests to. The default endpoint is built from the configured region.
                            visibility: secret
                            type: string
                          s3ForcePathStyle:
                            description: |-
                              (Optional) Whether to use path style URLs when communicating with S3.
                              Defaults to false.
                              This allows providers like LocalStack, Minio and Wasabi (and possibly others) to be used to host tech docs.
                            visibility: backend
                            type: boolean
                    required:
                    - type
                  - type: object
                    properties:
                      type:
                        type: string
                        enum:
                        - openStackSwift
                      openStackSwift:
                        description: Required when 'type' is set to openStackSwift
                        type: object
                        required:
                        - authUrl
                        - containerName
                        - credentials
                        - swiftUrl
                        properties:
                          credentials:
                            description: (Required) Credentials used to access a storage bucket.
                            visibility: secret
                            type: object
                            required:
                            - id
                            - secret
                            properties:
                              id:
                                description: (Required) Application Credential ID
                                visibility: secret
                                type: string
                              secret:
                                description: (Required) Application Credential Secret
                                visibility: secret
                                type: string
                          containerName:
                            description: (Required) Cloud Storage Container Name
                            visibility: backend
                            type: string
                          authUrl:
                            description: (Required) Auth url sometimes OpenStack uses different port check your OpenStack apis.
                            visibility: backend
                            type: string
                          swiftUrl:
                            description: (Required) Swift URL
                            visibility: backend
                            type: string
                    required:
                    - type
                  - type: object
                    properties:
                      type:
                        type: string
                        enum:
                        - azureBlobStorage
                      azureBlobStorage:
                        description: Required when 'type' is set to azureBlobStorage
                        type: object
                        required:
                        - containerName
                        - credentials
                        properties:
                          credentials:
                            description: (Required) Credentials used to access a storage container.
                            visibility: secret
                            type: object
                            required:
                            - accountName
                            properties:
                              accountName:
                                description: Account access name
                                visibility: secret
                                type: string
                              accountKey:
                                description: |-
                                  (Optional) Account secret primary key
                                  If not set, environment variables will be used to authenticate.
                                visibility: secret
                                type: string
                          containerName:
                            description: (Required) Cloud Storage Container Name
                            visibility: backend
                            type: string
                    required:
                    - type
                  - type: object
                    properties:
                      type:
                        type: string
                        enum:
                        - googleGcs
                      googleGcs:
                        description: Required when 'type' is set to googleGcs
                        type: object
                        required:
                        - bucketName
                        properties:
                          bucketName:
                            description: (Required) Cloud Storage Bucket Name
                            visibility: backend
                            type: string
                          credentials:
                            description: |-
                              (Optional) API key used to write to a storage bucket.
                              If not set, environment variables will be used to authenticate.
                            visibility: secret
                            type: string
                    required:
                    - type
                requestUrl:
                  visibility: frontend
                  type: string
                storageUrl:
                  type: string
                legacyUseCaseSensitiveTripletPaths:
                  description: |-
                    (Optional and not recommended) Prior to version [0.x.y] of TechDocs, docs
                    sites could only be accessed over paths with case-sensitive entity triplets
                    e.g. (namespace/Kind/name). If you are upgrading from an older version of
                    TechDocs and are unable to perform the necessary migration of files in your
                    external storage, you can set this value to `true` to temporarily revert to
                    the old, case-sensitive entity triplet behavior.
                  type: boolean
                  visibility: frontend
            proxy:
              description: |-
                A list of forwarding-proxies. Each key is a route to match,
                below the prefix that the proxy plugin is mounted on. It must
                start with a '/'.
              type: object
              additionalProperties:
                anyOf:
                - type: object
                  properties:
                    target:
                      description: Target of the proxy. Url string to be parsed with the url module.
                      type: string
                    headers:
                      description: Object with extra headers to be added to target requests.
                      type: object
                      additionalProperties:
                        type: string
                    changeOrigin:
                      description: 'Changes the origin of the host header to the target URL. Default: true.'
                      type: boolean
                    pathRewrite:
                      description: |-
                        Rewrite target's url path. Object-keys will be used as RegExp to match paths.
                        If pathRewrite is not specified, it is set to a single rewrite that removes the entire prefix and route.
                      type: object
                      additionalProperties:
                        type: string
                    allowedMethods:
                      description: 'Limit the forwarded HTTP methods, for example allowedMethods: [''GET''] to enforce read-only access.'
                      type: array
                      items:
                        type: string
                    allowedHeaders:
                      description: |-
                        Limit the forwarded HTTP methods. By default, only the headers that are considered safe for CORS
                        and headers that are set by the proxy will be forwarded.
                      type: array
                      items:
                        type: string
                  required:
                  - target
                - type: string
            organization:
              description: Configuration that provides information about the organization that the app is for.
              type: object
              properties:
                name:
                  description: The name of the organization that the app belongs to.
                  visibility: frontend
                  type: string
            homepage:
              type: object
              properties:
                clocks:
                  type: array
                  items:
                    type: object
                    required:
                    - label
                    - timezone
                    properties:
                      label:
                        visibility: frontend
                        type: string
                      timezone:
                        visibility: frontend
                        type: string
          description: This is the schema describing the structure of the app-config.yaml configuration file.
  licenses:
  - VMware Proprietary
  template:
    spec:
      fetch:
      - imgpkgBundle:
          image: dev.registry.tanzu.vmware.com/tap-gui/bundle@sha256:23152e73ea7f18be32d3ca420bc5eb422e0297230c015ec966a87dafd79a3a02
      template:
      - ytt:
          paths:
          - config/
      - kbld:
          paths:
          - '-'
          - .imgpkg/images.yml
      deploy:
      - kapp: {}
---
apiVersion: data.packaging.carvel.dev/v1alpha1
kind: Package
metadata:
  name: tap-gui.tanzu.vmware.com.1.1.0-rc.15
spec:
  refName: tap-gui.tanzu.vmware.com
  version: 1.1.0-rc.15
  releasedAt: "2022-03-03T21:58:10Z"
  releaseNotes: |
    This release adds the (off-by-default) supply-chain plugin, as well as
    continued improvements to the filtering mechanisms on the Runtime Resources
    page, and several small bugfixes and accessibility improvements.
  capacityRequirementsDescription: |
    Minimal. Tanzu Application Platform GUI has been observed consuming <1 CPU
    and ~150MB memory in test environments.
  valuesSchema:
    openAPIv3:
      title: Tanzu Application Platform GUI Configuration Schema
      description: |
        This is the schema describing the structure of the Tanzu Application
        Platform GUI config, including the structure of the Backstage
        app-config.yml file.
      properties:
        namespace:
          type: string
          description: |
            Namespace in which the Tanzu Application Platform GUI workloads will
            be applied. This namespace will be created as part of the deploy.
        service_type:
          type: string
          description: |
            the type for the Kubernetes Service which exposes Backstage. Common
            values are "ClusterIP", "NodePort" and "LoadBalancer".
        ingressEnabled:
          type: boolean
          description: |
            Flag for whether or not to create an HTTPProxy for ingress.
        ingressDomain:
          type: string
          description: |
            Domain to be used by the HTTPProxy ingress object. The "tap-gui"
            subdomain will be prepended to the value provided. For example:
            "example.com" would become "tap-gui.example.com".
        tls:
          type: object
          description: |
            Object for specifying TLS certificate delegation.
          properties:
            namespace:
              type: string
              description: |
                The targeted namespace for secret consumption by the HTTPProxy.
            secretName:
              type: string
              description: |
                The name of secret for consumption by the HTTPProxy.
        app_config:
          $schema: https://backstage.io/schema/config-v1
          title: Application Configuration Schema
          type: object
          definitions:
            LoginPageConfig:
              type: object
              properties:
                id:
                  visibility: frontend
                  type: string
                title:
                  visibility: frontend
                  type: string
                message:
                  visibility: frontend
                  type: string
          properties:
            app:
              type: object
              description: Generic frontend configuration.
              required:
              - baseUrl
              properties:
                baseUrl:
                  type: string
                  visibility: frontend
                  description: The public absolute root URL that the frontend.
                title:
                  type: string
                  visibility: frontend
                  description: The title of the app, as shown in the Backstage web interface.
                googleAnalyticsTrackingId:
                  type: string
                  visibility: frontend
                  description: Tracking ID for Google Analytics
                  examples:
                  - UA-000000-0
                datadogRum:
                  type: object
                  description: Datadog RUM events configuration
                  required:
                  - clientToken
                  - applicationId
                  properties:
                    env:
                      type: string
                      visibility: frontend
                      description: Environment for Datadog RUM events
                    clientToken:
                      type: string
                      visibility: frontend
                      description: clientToken for Datadog RUM events
                    applicationId:
                      type: string
                      visibility: frontend
                      description: applicationId for Datadog RUM events
                    site:
                      type: string
                      visibility: frontend
                      description: site for Datadog RUM events
                listen:
                  type: object
                  description: Listening configuration for local development
                  properties:
                    host:
                      type: string
                      visibility: frontend
                      description: The host that the frontend should be bound to. Only used for local development.
                    port:
                      type: number
                      visibility: frontend
                      description: The port that the frontend should be bound to. Only used for local development.
                support:
                  description: Information about support of this Backstage instance and how to contact the integrator team.
                  type: object
                  required:
                  - items
                  - url
                  properties:
                    url:
                      description: The primary support url.
                      visibility: frontend
                      type: string
                    items:
                      description: A list of categorized support item groupings.
                      type: array
                      items:
                        type: object
                        required:
                        - links
                        - title
                        properties:
                          title:
                            description: The title of the support item grouping.
                            visibility: frontend
                            type: string
                          icon:
                            description: An optional icon for the support item grouping.
                            visibility: frontend
                            type: string
                          links:
                            description: A list of support links for the Backstage instance inside this grouping.
                            type: array
                            items:
                              type: object
                              required:
                              - url
                              properties:
                                url:
                                  visibility: frontend
                                  type: string
                                title:
                                  visibility: frontend
                                  type: string
            auth:
              type: object
              description: Configuration that provides information on available configured authentication providers.
              properties:
                providers:
                  type: object
                  description: The available auth-provider options and attributes
                  additionalProperties:
                    type: object
                    visibility: frontend
                  properties:
                    google:
                      type: object
                      additionalProperties:
                        type: object
                        additionalProperties:
                          type: string
                    github:
                      type: object
                      additionalProperties:
                        type: object
                        additionalProperties:
                          type: string
                    gitlab:
                      type: object
                      additionalProperties:
                        type: object
                        additionalProperties:
                          type: string
                    saml:
                      type: object
                      required:
                      - cert
                      - entryPoint
                      - issuer
                      properties:
                        entryPoint:
                          type: string
                        logoutUrl:
                          type: string
                        issuer:
                          type: string
                        cert:
                          type: string
                        audience:
                          type: string
                        privateKey:
                          type: string
                        authnContext:
                          type: array
                          items:
                            type: string
                        identifierFormat:
                          type: string
                        decryptionPvk:
                          type: string
                        signatureAlgorithm:
                          enum:
                          - sha256
                          - sha512
                          type: string
                        digestAlgorithm:
                          type: string
                        acceptedClockSkewMs:
                          type: number
                    okta:
                      type: object
                      additionalProperties:
                        type: object
                        additionalProperties:
                          type: string
                    oauth2:
                      type: object
                      additionalProperties:
                        type: object
                        required:
                        - authorizationUrl
                        - clientId
                        - clientSecret
                        - tokenUrl
                        properties:
                          clientId:
                            type: string
                          clientSecret:
                            type: string
                          authorizationUrl:
                            type: string
                          tokenUrl:
                            type: string
                          scope:
                            type: string
                          disableRefresh:
                            type: boolean
                    oidc:
                      type: object
                      additionalProperties:
                        type: object
                        additionalProperties:
                          type: string
                    auth0:
                      type: object
                      additionalProperties:
                        type: object
                        additionalProperties:
                          type: string
                    microsoft:
                      type: object
                      additionalProperties:
                        type: object
                        additionalProperties:
                          type: string
                    onelogin:
                      type: object
                      additionalProperties:
                        type: object
                        additionalProperties:
                          type: string
                    awsalb:
                      type: object
                      required:
                      - region
                      properties:
                        issuer:
                          type: string
                        region:
                          type: string
                allowGuestAccess:
                  visibility: frontend
                  type: boolean
                loginPage:
                  type: object
                  properties:
                    auth0:
                      $ref: '#/definitions/LoginPageConfig'
                    bitbucket:
                      $ref: '#/definitions/LoginPageConfig'
                    github:
                      $ref: '#/definitions/LoginPageConfig'
                    gitlab:
                      $ref: '#/definitions/LoginPageConfig'
                    google:
                      $ref: '#/definitions/LoginPageConfig'
                    oidc:
                      $ref: '#/definitions/LoginPageConfig'
                    okta:
                      $ref: '#/definitions/LoginPageConfig'
                    onelogin:
                      $ref: '#/definitions/LoginPageConfig'
                    microsoft:
                      $ref: '#/definitions/LoginPageConfig'
                environment:
                  description: |-
                    The 'environment' attribute added as an optional parameter to have configurable environment value for `auth.providers`.
                    default value: 'development'
                    optional values: 'development' | 'production'
                  visibility: frontend
                  type: string
                session:
                  type: object
                  properties:
                    secret:
                      description: The secret attribute of session object.
                      visibility: secret
                      type: string
                keyStore:
                  description: To control how to store JWK data in auth-backend
                  type: object
                  properties:
                    provider:
                      enum:
                      - database
                      - firestore
                      - memory
                      type: string
                    firestore:
                      type: object
                      properties:
                        host:
                          description: The host to connect to
                          type: string
                        port:
                          description: The port to connect to
                          type: number
                        ssl:
                          description: Whether to use SSL when connecting.
                          type: boolean
                        projectId:
                          description: The Google Cloud Project ID
                          type: string
                        keyFilename:
                          description: |-
                            Local file containing the Service Account credentials.
                            You can omit this value to automatically read from
                            GOOGLE_APPLICATION_CREDENTIALS env which is useful for local
                            development.
                          type: string
                        path:
                          description: The path to use for the collection. Defaults to 'sessions'
                          type: string
                        timeout:
                          description: Timeout used for database operations. Defaults to 10000ms
                          type: number
            backend:
              description: Generic backend configuration.
              type: object
              required:
              - baseUrl
              - database
              - listen
              properties:
                baseUrl:
                  description: The public absolute root URL that the backend is reachable at, from the browser's perspective.
                  visibility: frontend
                  type: string
                auth:
                  description: Backend configuration for when request authentication is enabled
                  type: object
                  required:
                  - keys
                  properties:
                    keys:
                      description: Keys shared by all backends for signing and validating backend tokens.
                      type: array
                      items:
                        type: object
                        required:
                        - secret
                        properties:
                          secret:
                            description: |-
                              Secret for generating tokens. Should be a base64 string, recommended
                              length is 24 bytes.
                            visibility: secret
                            type: string
                listen:
                  description: Address that the backend should listen to.
                  anyOf:
                  - type: object
                    properties:
                      host:
                        description: Address of the interface that the backend should bind to.
                        type: string
                      port:
                        description: Port that the backend should listen to.
                        type:
                        - string
                        - number
                      address:
                        description: Address of the interface that the backend should bind to.
                        type: string
                  - type: string
                https:
                  description: |-
                    HTTPS configuration for the backend. If omitted the backend will serve HTTP.

                    Setting this to `true` will cause self-signed certificates to be generated, which
                    can be useful for local development or other non-production scenarios.
                  anyOf:
                  - type: object
                    properties:
                      certificate:
                        description: Certificate configuration
                        type: object
                        required:
                        - cert
                        - key
                        properties:
                          cert:
                            description: PEM encoded certificate. Use $file to load in a file
                            type: string
                          key:
                            description: PEM encoded certificate key. Use $file to load in a file.
                            visibility: secret
                            type: string
                  - enum:
                    - true
                    type: boolean
                database:
                  description: Database connection configuration, select base database type using the `client` field
                  type: object
                  required:
                  - client
                  - connection
                  properties:
                    client:
                      description: Default database client to use
                      enum:
                      - pg
                      - sqlite3
                      type: string
                    connection:
                      description: Base database connection string or Knex object
                      anyOf:
                      - type: object
                        properties: {}
                        additionalProperties: true
                      - type: string
                    prefix:
                      description: Database name prefix override
                      type: string
                    ensureExists:
                      description: |-
                        Whether to ensure the given database exists by creating it if it does not.
                        Defaults to true if unspecified.
                      type: boolean
                    pluginDivisionMode:
                      description: |-
                        How plugins databases are managed/divided in the provided database instance.

                        `database` -> Plugins are each given their own database to manage their schemas/tables.

                        `schema` -> Plugins will be given their own schema (in the specified/default database)
                                    to manage their tables.

                        NOTE: Currently only supported by the `pg` client.
                      default: database
                      enum:
                      - database
                      - schema
                      type: string
                    knexConfig:
                      description: |-
                        Arbitrary config object to pass to knex when initializing
                        (https://knexjs.org/#Installation-client). Most notable is the debug
                        and asyncStackTraces booleans
                      type: object
                      additionalProperties: true
                    plugin:
                      description: Plugin specific database configuration and client override
                      type: object
                      additionalProperties:
                        type: object
                        properties:
                          client:
                            description: Database client override
                            enum:
                            - pg
                            - sqlite3
                            type: string
                          connection:
                            description: Database connection string or Knex object override
                            anyOf:
                            - type: object
                              properties: {}
                              additionalProperties: true
                            - type: string
                          ensureExists:
                            description: |-
                              Whether to ensure the given database exists by creating it if it does not.
                              Defaults to base config if unspecified.
                            type: boolean
                          knexConfig:
                            description: |-
                              Arbitrary config object to pass to knex when initializing
                              (https://knexjs.org/#Installation-client). Most notable is the
                              debug and asyncStackTraces booleans.

                              This is merged recursively into the base knexConfig
                            type: object
                            additionalProperties: true
                cache:
                  description: Cache connection configuration, select cache type using the `store` field
                  anyOf:
                  - type: object
                    required:
                    - store
                    properties:
                      store:
                        type: string
                        enum:
                        - memory
                  - type: object
                    required:
                    - connection
                    - store
                    properties:
                      store:
                        type: string
                        enum:
                        - memcache
                      connection:
                        description: A memcache connection string in the form `user:pass@host:port`.
                        type: string
                cors:
                  type: object
                  properties:
                    origin:
                      anyOf:
                      - type: array
                        items:
                          type: string
                      - type: string
                    methods:
                      anyOf:
                      - type: array
                        items:
                          type: string
                      - type: string
                    allowedHeaders:
                      anyOf:
                      - type: array
                        items:
                          type: string
                      - type: string
                    exposedHeaders:
                      anyOf:
                      - type: array
                        items:
                          type: string
                      - type: string
                    credentials:
                      type: boolean
                    maxAge:
                      type: number
                    preflightContinue:
                      type: boolean
                    optionsSuccessStatus:
                      type: number
                reading:
                  description: |-
                    Configuration related to URL reading, used for example for reading catalog info
                    files, scaffolder templates, and techdocs content.
                  type: object
                  properties:
                    allow:
                      description: |-
                        A list of targets to allow outgoing requests to. Users will be able to make
                        requests on behalf of the backend to the targets that are allowed by this list.
                      type: array
                      items:
                        type: object
                        required:
                        - host
                        properties:
                          host:
                            description: |-
                              A host to allow outgoing requests to, being either a full host or
                              a subdomain wildcard pattern with a leading `*`. For example `example.com`
                              and `*.example.com` are valid values, `prod.*.example.com` is not.
                              The host may also contain a port, for example `example.com:8080`.
                            type: string
                          paths:
                            description: |-
                              An optional list of paths. In case they are present only targets matching
                              any of them will are allowed. You can use trailing slashes to make sure only
                              subdirectories are allowed, for example `/mydir/` will allow targets with
                              paths like `/mydir/a` but will block paths like `/mydir2`.
                            type: array
                            items:
                              type: string
                csp:
                  description: |-
                    Content Security Policy options.

                    The keys are the plain policy ID, e.g. "upgrade-insecure-requests". The
                    values are on the format that the helmet library expects them, as an
                    array of strings. There is also the special value false, which means to
                    remove the default value that Backstage puts in place for that policy.
                  type: object
                  additionalProperties:
                    anyOf:
                    - type: array
                      items:
                        type: string
                    - enum:
                      - false
                      type: boolean
            organization:
              description: Configuration that provides information about the organization that the app is for.
              type: object
              properties:
                name:
                  description: The name of the organization that the app belongs to.
                  visibility: frontend
                  type: string
            homepage:
              type: object
              properties:
                clocks:
                  type: array
                  items:
                    type: object
                    required:
                    - label
                    - timezone
                    properties:
                      label:
                        visibility: frontend
                        type: string
                      timezone:
                        visibility: frontend
                        type: string
            techdocs:
              description: Configuration options for the techdocs plugin
              type: object
              required:
              - builder
              properties:
                builder:
                  description: Documentation building process depends on the builder attr
                  visibility: frontend
                  enum:
                  - external
                  - local
                  type: string
                legacyUseCaseSensitiveTripletPaths:
                  description: Allows fallback to case-sensitive triplets in case of migration issues.
                  visibility: frontend
                  type: boolean
                requestUrl:
                  visibility: frontend
                  type: string
                sanitizer:
                  type: object
                  properties:
                    allowedIframeHosts:
                      description: |-
                        Allows iframe tag only for listed hosts
                        Example:
                         allowedIframeHosts: ["example.com"]
                         this will allow all iframes with the host `example.com` in the src attribute
                      visibility: frontend
                      type: array
                      items:
                        type: string
                generator:
                  description: Techdocs generator information
                  type: object
                  required:
                  - runIn
                  properties:
                    runIn:
                      description: Where to run the techdocs (mkdocs) generator
                      enum:
                      - docker
                      - local
                      type: string
                    dockerImage:
                      description: Override the default techdocs docker image
                      type: string
                    pullImage:
                      description: Pull the latest docker image
                      type: boolean
                generators:
                  description: Techdocs generator information
                  type: object
                  required:
                  - techdocs
                  properties:
                    techdocs:
                      enum:
                      - docker
                      - local
                      type: string
                publisher:
                  description: Techdocs publisher information
                  anyOf:
                  - type: object
                    properties:
                      type:
                        type: string
                        enum:
                        - local
                    required:
                    - type
                  - type: object
                    properties:
                      type:
                        type: string
                        enum:
                        - awsS3
                      awsS3:
                        description: Required when 'type' is set to awsS3
                        type: object
                        required:
                        - bucketName
                        properties:
                          credentials:
                            description: |-
                              (Optional) Credentials used to access a storage bucket.
                              If not set, environment variables or aws config file will be used to authenticate.
                            visibility: secret
                            type: object
                            properties:
                              accessKeyId:
                                description: User access key id
                                visibility: secret
                                type: string
                              secretAccessKey:
                                description: User secret access key
                                visibility: secret
                                type: string
                              roleArn:
                                description: ARN of role to be assumed
                                visibility: backend
                                type: string
                          bucketName:
                            description: (Required) Cloud Storage Bucket Name
                            visibility: backend
                            type: string
                          region:
                            description: |-
                              (Optional) AWS Region.
                              If not set, AWS_REGION environment variable or aws config file will be used.
                            visibility: secret
                            type: string
                          endpoint:
                            description: |-
                              (Optional) AWS Endpoint.
                              The endpoint URI to send requests to. The default endpoint is built from the configured region.
                            visibility: secret
                            type: string
                          s3ForcePathStyle:
                            description: |-
                              (Optional) Whether to use path style URLs when communicating with S3.
                              Defaults to false.
                              This allows providers like LocalStack, Minio and Wasabi (and possibly others) to be used to host tech docs.
                            visibility: backend
                            type: boolean
                          sse:
                            description: |-
                              (Optional) AWS Server Side Encryption
                              Defaults to undefined.
                              If not set, encrypted buckets will fail to publish.
                              https://docs.aws.amazon.com/AmazonS3/latest/userguide/specifying-s3-encryption.html
                            enum:
                            - AES256
                            - aws:kms
                            type: string
                    required:
                    - type
                  - type: object
                    properties:
                      type:
                        type: string
                        enum:
                        - openStackSwift
                      openStackSwift:
                        description: Required when 'type' is set to openStackSwift
                        type: object
                        required:
                        - authUrl
                        - containerName
                        - credentials
                        - swiftUrl
                        properties:
                          credentials:
                            description: (Required) Credentials used to access a storage bucket.
                            visibility: secret
                            type: object
                            required:
                            - id
                            - secret
                            properties:
                              id:
                                description: (Required) Application Credential ID
                                visibility: secret
                                type: string
                              secret:
                                description: (Required) Application Credential Secret
                                visibility: secret
                                type: string
                          containerName:
                            description: (Required) Cloud Storage Container Name
                            visibility: backend
                            type: string
                          authUrl:
                            description: (Required) Auth url sometimes OpenStack uses different port check your OpenStack apis.
                            visibility: backend
                            type: string
                          swiftUrl:
                            description: (Required) Swift URL
                            visibility: backend
                            type: string
                    required:
                    - type
                  - type: object
                    properties:
                      type:
                        type: string
                        enum:
                        - azureBlobStorage
                      azureBlobStorage:
                        description: Required when 'type' is set to azureBlobStorage
                        type: object
                        required:
                        - containerName
                        - credentials
                        properties:
                          credentials:
                            description: (Required) Credentials used to access a storage container.
                            visibility: secret
                            type: object
                            required:
                            - accountName
                            properties:
                              accountName:
                                description: Account access name
                                visibility: secret
                                type: string
                              accountKey:
                                description: |-
                                  (Optional) Account secret primary key
                                  If not set, environment variables will be used to authenticate.
                                visibility: secret
                                type: string
                          containerName:
                            description: (Required) Cloud Storage Container Name
                            visibility: backend
                            type: string
                    required:
                    - type
                  - type: object
                    properties:
                      type:
                        type: string
                        enum:
                        - googleGcs
                      googleGcs:
                        description: Required when 'type' is set to googleGcs
                        type: object
                        required:
                        - bucketName
                        properties:
                          bucketName:
                            description: (Required) Cloud Storage Bucket Name
                            visibility: backend
                            type: string
                          credentials:
                            description: |-
                              (Optional) API key used to write to a storage bucket.
                              If not set, environment variables will be used to authenticate.
                            visibility: secret
                            type: string
                    required:
                    - type
                storageUrl:
                  type: string
            supplyChain:
              type: object
              required:
              - enablePlugin
              properties:
                enablePlugin:
                  visibility: frontend
                  type: boolean
            integrations:
              description: Configuration for integrations towards various external repository provider systems
              type: object
              properties:
                azure:
                  description: Integration configuration for Azure
                  type: array
                  items:
                    type: object
                    required:
                    - host
                    properties:
                      host:
                        description: The hostname of the given Azure instance
                        visibility: frontend
                        type: string
                      token:
                        description: Token used to authenticate requests.
                        visibility: secret
                        type: string
                bitbucket:
                  description: Integration configuration for Bitbucket
                  type: array
                  items:
                    type: object
                    required:
                    - host
                    properties:
                      host:
                        description: The hostname of the given Bitbucket instance
                        visibility: frontend
                        type: string
                      token:
                        description: Token used to authenticate requests.
                        visibility: secret
                        type: string
                      apiBaseUrl:
                        description: The base url for the Bitbucket API, for example https://api.bitbucket.org/2.0
                        visibility: frontend
                        type: string
                      username:
                        description: The username to use for authenticated requests.
                        visibility: secret
                        type: string
                      appPassword:
                        description: Bitbucket app password used to authenticate requests.
                        visibility: secret
                        type: string
                github:
                  description: Integration configuration for GitHub
                  type: array
                  items:
                    type: object
                    required:
                    - host
                    properties:
                      host:
                        description: The hostname of the given GitHub instance
                        visibility: frontend
                        type: string
                      token:
                        description: Token used to authenticate requests.
                        visibility: secret
                        type: string
                      apiBaseUrl:
                        description: The base url for the GitHub API, for example https://api.github.com
                        visibility: frontend
                        type: string
                      rawBaseUrl:
                        description: The base url for GitHub raw resources, for example https://raw.githubusercontent.com
                        visibility: frontend
                        type: string
                      apps:
                        description: GitHub Apps configuration
                        visibility: backend
                        type: array
                        items:
                          type: object
                          required:
                          - appId
                          - clientId
                          - clientSecret
                          - privateKey
                          - webhookSecret
                          properties:
                            appId:
                              description: The numeric GitHub App ID, string for environment variables
                              type:
                              - string
                              - number
                            privateKey:
                              description: The private key to use for auth against the app
                              visibility: secret
                              type: string
                            webhookSecret:
                              description: The secret used for webhooks
                              visibility: secret
                              type: string
                            clientId:
                              description: The client ID to use
                              type: string
                            clientSecret:
                              description: The client secret to use
                              visibility: secret
                              type: string
                gitlab:
                  description: Integration configuration for GitLab
                  type: array
                  items:
                    type: object
                    required:
                    - host
                    properties:
                      host:
                        description: The host of the target that this matches on, e.g. "gitlab.com".
                        visibility: frontend
                        type: string
                      apiBaseUrl:
                        description: |-
                          The base URL of the API of this provider, e.g.
                          "https://gitlab.com/api/v4", with no trailing slash.

                          May be omitted specifically for public GitLab; then it will be deduced.
                        visibility: frontend
                        type: string
                      token:
                        description: |-
                          The authorization token to use for requests to this provider.

                          If no token is specified, anonymous access is used.
                        visibility: secret
                        type: string
                      baseUrl:
                        description: |-
                          The baseUrl of this provider, e.g. "https://gitlab.com", which is
                          passed into the GitLab client.

                          If no baseUrl is provided, it will default to https://${host}.
                        visibility: frontend
                        type: string
                googleGcs:
                  description: Integration configuration for Google Cloud Storage
                  type: object
                  properties:
                    clientEmail:
                      description: Service account email used to authenticate requests.
                      visibility: backend
                      type: string
                    privateKey:
                      description: Service account private key used to authenticate requests.
                      visibility: secret
                      type: string
                awsS3:
                  description: Integration configuration for AWS S3 Service
                  type: array
                  items:
                    type: object
                    required:
                    - host
                    properties:
                      host:
                        description: The host of the target that this matches on, e.g. "amazonaws.com".
                        visibility: frontend
                        type: string
                      accessKeyId:
                        description: Account access key used to authenticate requests.
                        visibility: backend
                        type: string
                      secretAccessKey:
                        description: Account secret key used to authenticate requests.
                        visibility: secret
                        type: string
                      roleArn:
                        description: ARN of the role to be assumed
                        visibility: backend
                        type: string
                      endpoint:
                        description: |-
                          AWS Endpoint.
                          The endpoint URI to send requests to. The default endpoint is built from the configured region.
                        visibility: frontend
                        type: string
                      s3ForcePathStyle:
                        description: |-
                          Whether to use path style URLs when communicating with S3.
                          Defaults to false.
                          This allows providers like LocalStack, Minio and Wasabi (and possibly others) to be used.
                        visibility: frontend
                        type: boolean
            catalog:
              description: Configuration options for the catalog plugin.
              type: object
              properties:
                rules:
                  description: |-
                    Rules to apply to all catalog entities, from any location.

                    An undefined list of matchers means match all, an empty list of
                    matchers means match none.

                    This is commonly used to put in what amounts to a whitelist of kinds
                    that regular users of Backstage are permitted to register locations
                    for. This can be used to stop them from registering yaml files
                    describing for example a Group entity called "admin" that they make
                    themselves members of, or similar.
                  type: array
                  items:
                    type: object
                    required:
                    - allow
                    properties:
                      allow:
                        description: |-
                          Allow entities of these particular kinds.

                          E.g. ["Component", "API", "Template", "Location"]
                        type: array
                        items:
                          type: string
                readonly:
                  description: |-
                    Readonly defines whether the catalog allows writes after startup.

                    Setting 'readonly=false' allows users to register their own components.
                    This is the default value.

                    Setting 'readonly=true' configures catalog to only allow reads. This can
                    be used in combination with static locations to only serve operator
                    provided locations. Effectively this removes the ability to register new
                    components to a running backstage instance.
                  type: boolean
                locations:
                  description: |-
                    A set of static locations that the catalog shall always keep itself
                    up-to-date with. This is commonly used for large, permanent integrations
                    that are defined by the Backstage operators at an organization, rather
                    than individual things that users register dynamically.

                    These have (optional) rules of their own. These override what the global
                    rules above specify. This way, you can prevent everybody from register
                    e.g. User and Group entities, except for one or a few static locations
                    that have those two kinds explicitly allowed.

                    For example:

                    ```yaml
                    rules:
                      - allow: [Component, API, Template, Location]
                    locations:
                      - type: url
                        target: https://github.com/org/repo/blob/master/users.yaml
                        rules:
                          - allow: [User, Group]
                      - type: url
                        target: https://github.com/org/repo/blob/master/systems.yaml
                        rules:
                          - allow: [System]
                    ```
                  type: array
                  items:
                    type: object
                    required:
                    - target
                    - type
                    properties:
                      type:
                        description: The type of location, e.g. "url".
                        type: string
                      target:
                        description: |-
                          The target URL of the location, e.g.
                          "https://github.com/org/repo/blob/master/users.yaml".
                        type: string
                      rules:
                        description: |-
                          Optional extra rules that apply to this particular location.

                          These override the global rules above.
                        type: array
                        items:
                          type: object
                          required:
                          - allow
                          properties:
                            allow:
                              description: |-
                                Allow entities of these particular kinds.

                                E.g. ["Group", "User"]
                              type: array
                              items:
                                type: string
                processors:
                  description: List of processor-specific options and attributes
                  type: object
                  properties:
                    githubOrg:
                      description: GithubOrgReaderProcessor configuration
                      type: object
                      required:
                      - providers
                      properties:
                        providers:
                          description: The configuration parameters for each single GitHub org provider.
                          type: array
                          items:
                            type: object
                            required:
                            - target
                            properties:
                              target:
                                description: |-
                                  The prefix of the target that this matches on, e.g.
                                  "https://github.com", with no trailing slash.
                                type: string
                              apiBaseUrl:
                                description: |-
                                  The base URL of the API of this provider, e.g.
                                  "https://api.github.com", with no trailing slash.

                                  May be omitted specifically for GitHub; then it will be deduced.
                                type: string
                              token:
                                description: |-
                                  The authorization token to use for requests to this provider.

                                  If no token is specified, anonymous access is used.
                                visibility: secret
                                type: string
                    githubMultiOrg:
                      description: GithubMultiOrgReaderProcessor configuration
                      type: object
                      required:
                      - orgs
                      properties:
                        orgs:
                          description: The configuration parameters for each GitHub org to process.
                          type: array
                          items:
                            type: object
                            required:
                            - name
                            properties:
                              name:
                                description: The name of the GitHub org to process.
                                type: string
                              groupNamespace:
                                description: |-
                                  The namespace of the group created for this org.

                                  Defaults to org name if omitted.
                                type: string
                              userNamespace:
                                description: |-
                                  The namespace of the users created from this org.

                                  Defaults to empty string if omitted.
                                type: string
                    awsOrganization:
                      description: AwsOrganizationCloudAccountProcessor configuration
                      type: object
                      required:
                      - provider
                      properties:
                        provider:
                          type: object
                          properties:
                            roleArn:
                              description: The role to be assumed by this processor
                              type: string
            proxy:
              description: |-
                A list of forwarding-proxies. Each key is a route to match,
                below the prefix that the proxy plugin is mounted on. It must
                start with a '/'.
              type: object
              additionalProperties:
                anyOf:
                - type: object
                  properties:
                    target:
                      description: Target of the proxy. Url string to be parsed with the url module.
                      type: string
                    headers:
                      description: Object with extra headers to be added to target requests.
                      type: object
                      additionalProperties:
                        type: string
                    changeOrigin:
                      description: 'Changes the origin of the host header to the target URL. Default: true.'
                      type: boolean
                    pathRewrite:
                      description: |-
                        Rewrite target's url path. Object-keys will be used as RegExp to match paths.
                        If pathRewrite is not specified, it is set to a single rewrite that removes the entire prefix and route.
                      type: object
                      additionalProperties:
                        type: string
                    allowedMethods:
                      description: 'Limit the forwarded HTTP methods, for example allowedMethods: [''GET''] to enforce read-only access.'
                      type: array
                      items:
                        type: string
                    allowedHeaders:
                      description: |-
                        Limit the forwarded HTTP methods. By default, only the headers that are considered safe for CORS
                        and headers that are set by the proxy will be forwarded.
                      type: array
                      items:
                        type: string
                  required:
                  - target
                - type: string
            kubernetes:
              type: object
              required:
              - clusterLocatorMethods
              - serviceLocatorMethod
              properties:
                objectTypes:
                  type: array
                  items:
                    enum:
                    - configmaps
                    - cronjobs
                    - deployments
                    - horizontalpodautoscalers
                    - ingresses
                    - jobs
                    - pods
                    - replicasets
                    - services
                    type: string
                serviceLocatorMethod:
                  type: object
                  required:
                  - type
                  properties:
                    type:
                      type: string
                      enum:
                      - multiTenant
                clusterLocatorMethods:
                  type: array
                  items:
                    anyOf:
                    - type: object
                      properties:
                        type:
                          visibility: frontend
                          type: string
                          enum:
                          - gke
                        projectId:
                          visibility: frontend
                          type: string
                        region:
                          visibility: frontend
                          type: string
                        skipTLSVerify:
                          visibility: frontend
                          type: boolean
                      required:
                      - projectId
                      - type
                    - type: object
                      properties:
                        type:
                          visibility: frontend
                          type: string
                          enum:
                          - config
                        clusters:
                          type: array
                          items:
                            type: object
                            required:
                            - authProvider
                            - name
                            - url
                            properties:
                              url:
                                visibility: frontend
                                type: string
                              name:
                                visibility: frontend
                                type: string
                              serviceAccountToken:
                                visibility: secret
                                type: string
                              authProvider:
                                visibility: frontend
                                enum:
                                - aws
                                - google
                                - serviceAccount
                                type: string
                              skipTLSVerify:
                                visibility: frontend
                                type: boolean
                      required:
                      - clusters
                      - type
                customResources:
                  type: array
                  items:
                    type: object
                    required:
                    - apiVersion
                    - group
                    - plural
                    properties:
                      group:
                        type: string
                      apiVersion:
                        type: string
                      plural:
                        type: string
                apiVersionOverrides:
                  description: |-
                    (Optional) API Version Overrides
                    If set, the specified api version will be used to make requests for the corresponding object.
                    If running a legacy Kubernetes version, you may use this to override the default api versions
                    that are not supported in your cluster.
                  type: object
                  additionalProperties:
                    type: string
                  properties:
                    pods:
                      type: string
                    services:
                      type: string
                    configmaps:
                      type: string
                    deployments:
                      type: string
                    replicasets:
                      type: string
                    horizontalpodautoscalers:
                      type: string
                    cronjobs:
                      type: string
                    jobs:
                      type: string
                    ingresses:
                      type: string
            scaffolder:
              description: Configuration options for the scaffolder plugin
              type: object
              properties:
                defaultAuthor:
                  description: The commit author info used when new components are created.
                  type: object
                  properties:
                    name:
                      type: string
                    email:
                      type: string
                defaultCommitMessage:
                  description: The commit message used when new components are created.
                  type: string
            permission:
              description: Configuration options for Backstage permissions and authorization
              type: object
              properties:
                enabled:
                  description: |-
                    Whether authorization is enabled in Backstage. Defaults to false, which means authorization
                    requests will be automatically allowed without invoking the authorization policy.
                  visibility: frontend
                  type: boolean
          description: This is the schema describing the structure of the app-config.yaml configuration file.
  licenses:
  - VMware Proprietary
  template:
    spec:
      fetch:
      - imgpkgBundle:
          image: dev.registry.tanzu.vmware.com/tap-gui/bundle@sha256:290c5928817175f8be0f39be8ac39802aa26a6210a42acbe2c7e5cc3ebaf211b
      template:
      - ytt:
          paths:
          - config/
      - kbld:
          paths:
          - '-'
          - .imgpkg/images.yml
      deploy:
      - kapp: {}
---
apiVersion: data.packaging.carvel.dev/v1alpha1
kind: PackageMetadata
metadata:
  name: tap.tanzu.vmware.com
spec:
  displayName: "Tanzu Application Platform"
  shortDescription: "Package to install a set of TAP components to get you started based on your use case."
  longDescription: "Tanzu Application Platform package lets you install a setup of TAP components in one go. You can chose your use case by just selecting a profile."
  providerName: "VMware"
  maintainers:
  - name: "Dmitriy Kalinin"
  supportDescription: "https://tanzu.vmware.com/support"
---
apiVersion: data.packaging.carvel.dev/v1alpha1
kind: Package
metadata:
  name: tap.tanzu.vmware.com.1.0.0 
spec:
  refName: tap.tanzu.vmware.com
  version: 1.0.0 
  releaseNotes: |
    Beta release 1.0.0  of Tanzu Application Platform.
    This package allows to select which set of packages to install via profile data value.
  releasedAt: "2022-01-11T00:00:00Z"
  template:
    spec:
      fetch:
      - imgpkgBundle:
          image: dev.registry.tanzu.vmware.com/tanzu-application-platform/tap@sha256:0e82786cabb59287893827fff05b9cffa496623838406c0660b77f896d65774b
      template:
      - ytt:
          paths:
          - config/
      - kbld:
          paths:
          - '-'
          - .imgpkg/images.yml
      deploy:
      - kapp: {}
  valuesSchema:
    openAPIv3:
      type: object
      additionalProperties: false
      properties:
        profile:
          type: string
          default: full
          description: "Profile to install. Valid values: full, light"
        supply_chain: 
          type: string
          default: basic
          description: "Supply chain to install. Valid values: basic, testing, testing_scanning"
        excluded_packages:
          type: array
          items:
            type: string
          default: []
          description: "List of packages to exclude from installation (e.g. [tap-gui.tanzu.vmware.com])"
        api_portal:
          type: object
          additionalProperties: true
          properties: {}
          description: "API Portal configuration"
        accelerator:
          type: object
          additionalProperties: true
          properties: {}
          description: "Accelerator configuration"
        appliveview:
          type: object
          additionalProperties: true
          properties: {}
          description: "App Live View configuration"
        cnrs:
          type: object
          additionalProperties: true
          description: "Cloud Native Runtimes configuration"
          properties: 
            ingress:
              type: object
              properties:
                reuse_crds:
                  type: boolean
                  description: "Optional: Only valid if a Contour instance already present in the cluster. Set to \"true\" if you want CNR to re-use the cluster's existing Contour CRDs."
                  default: true
                external:
                  type: object
                  properties:
                    namespace:
                      type: string
                      description: "Optional: Only valid if a Contour instance already present in the cluster. Specify a namespace where an existing Contour is installed on your cluster (for external services) if you want CNR to use your Contour instance."
                      default: tanzu-system-ingress
                internal:
                  type: object
                  properties:
                    namespace:
                      type: string
                      description: "Optional: Only valid if a Contour instance already present in the cluster. Specify a namespace where an existing Contour is installed on your cluster (for internal services) if you want CNR to use your Contour instance."
                      default: tanzu-system-ingress 
        ootb_supply_chain_basic:
          type: object
          additionalProperties: true
          properties: {}           
          description: "OOTB Supply Chain Basic configuration"
        ootb_supply_chain_testing:
          type: object
          additionalProperties: true
          properties: {}
          description: "OOTB Supply Chain Testing configuration"
        ootb_supply_chain_testing_scanning:
          type: object
          additionalProperties: true
          properties: {}
          description: "OOTB Supply Chain Testing Scanning configuration"
        image_policy_webhook:
          type: object
          additionalProperties: true
          properties: {}
          description: "Image Policy Webhook configuration"
        buildservice:
          type: object
          description: "Build Service configuration"
          properties:
            kp_default_repository:
              type: string
              description: docker repository (required)
              examples:
              - registry.io/build-service
            kp_default_repository_username:
              type: string
              description: registry username (required)
              examples:
              - janedoe@vmware.com
            kp_default_repository_password:
              type: string
              description: registry password (required)
              examples:
              - password
            tanzunet_username:
              type: string
              description: tanzunet registry username (required for dependency updater feature)
              examples:
              - janedoe@vmware.com
            tanzunet_password:
              type: string
              description: tanzunet registry password (required for dependency updater feature)
              examples:
              - password
            ca_cert_data:
              type: string
              description: tbs registry ca certificate (used for self signed registry)
        tap_gui:
          type: object
          additionalProperties: true
          properties: {}
          description: "TAP GUI configuration"
        learningcenter:
          type: object
          additionalProperties: true
          properties: {}
          description: "Learning Center configuration"
        scanning:
          type: object
          additionalProperties: true
          properties: {}
          description: "Scan controller configuration"
