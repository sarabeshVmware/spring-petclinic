                system-cluster-critical. This value must be enclosed in quotes ("").
                If this value is not specified then a default value of 5 is used.
              default: "5"
              examples:
              - "10"
        replicas:
          type: integer
          description: |
            The number of replicas to be created for the Image Policy Webhook. This value must not be enclosed
            in quotes.
            If this value is not specified then a default value of 1 is used.
          default: 1
          examples:
          - 6
        limits_cpu:
          type: string
          description: |
            The CPU limit defines a hard ceiling on how much CPU time that the
            Image Policy Webhook controller manager container can use.
            https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/#meaning-of-cpu
          default: 200m
          examples:
          - '"1.0" or "1000m"'
