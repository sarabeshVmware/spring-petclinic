apiVersion: data.packaging.carvel.dev/v1alpha1
kind: Package
metadata:
  name: metadata-store.apps.tanzu.vmware.com.1.1.0
spec:
  refName: metadata-store.apps.tanzu.vmware.com
  version: 1.1.0
  releaseNotes: "https://docs.vmware.com/en/VMware-Tanzu-Application-Platform/index.html"
  releasedAt: "2022-03-01T17:00:00Z"
  valuesSchema:
    openAPIv3:
      title: metadata-store.tanzu.vmware.com values schema
      examples:
      - db_host: metadata-store-db
        db_user: metadata-store-user
        db_password: password0123456
        db_name: metadata-store
        db_port: "5432"
        db_sslmode: verify-full
        db_ca_certificate: ""
        db_max_open_conns: 10
        db_max_idle_conns: 100
        db_conn_max_lifetime: 60
        deploy_internal_db: "true"
        app_service_type: LoadBalancer
        api_port: 9443
        api_host: localhost
        auth_proxy_port: 8443
        auth_proxy_host: 0.0.0.0
        use_cert_manager: "true"
        database_request_storage: 10Gi
        pg_req_memory: 1Gi
        pg_limit_memory: 4Gi
        app_req_memory: 128Mi
        app_req_cpu: 100m
        app_limit_memory: 512Mi
        app_limit_cpu: 250m
        app_replicas: 1
        db_replicas: 1
        add_default_rw_service_account: "true"
      properties:
        db_host:
          type: string
          description: The address to the postgres database host that the metadata-store app uses to connect. The default is set to metadata-store-db which is the postgres service name. Changing this does not change the postgres service name
          default: metadata-store-db
          examples:
          - metadata-store-db
          - some-dns-name.example.com
          - 192.168.0.1
        db_user:
          type: string
          description: The database user to create and use for updating and querying. The metadata postgres section create this user. The metadata api server uses this username to connect to the database.
          default: metadata-store-user
        db_password:
          type: string
          description: The database user password. If no value is provided, a 32 character value will be generated.
          default: ""
        db_name:
          type: string
          description: The name of the database to use.
          default: metadata-store
        db_port:
          type: string
          description: The database port to use. This is the port to use when connecting to the database pod.
          default: "5432"
        db_sslmode:
          type: string
          description: Determines the security connection between API server and Postgres database. This can be set to 'verify-ca' or 'verify-full'
          default: verify-full
          examples:
          - verify-ca
          - verify-full
        db_ca_certificate:
          type: string
          description: This should only be set in the case when 'deploy_internal_db' is 'false'. Set this to the trusted CA Certificate that signed the Postgres DB TLS Certificate
          default: ""
        db_max_open_conns:
          type: integer
          description: Sets the maximum number of open database connections from the Metadata Store to the database.
          default: 10
        db_max_idle_conns:
          type: integer
          description: Sets the maximum number of database connections from the Metadata Store in the idle connection pool.
          default: 100
        db_conn_max_lifetime:
          type: integer
          description: Sets the maximum amount of time a database connection may be reused in seconds.
          default: 60
        deploy_internal_db:
          type: string
          description: If set to 'true', a postgres deployment will be created. If set to 'false', db_host and db_port should point to an accessible postgres instance. Postgres connections require TLS, so the corresponding db_ca_certification must be provided
          default: "true"
        app_service_type:
          type: string
          description: The type of service to use for the metadata app service. This can be set to 'Nodeport' or 'LoadBalancer'.
          default: LoadBalancer
          examples:
          - NodePort
          - LoadBalancer
        api_port:
          type: integer
          description: The internal port for the metadata app api endpoint. This will be used by the kube-rbac-proxy sidecar.
          default: 9443
        api_host:
          type: string
          description: The internal hostname for the metadata api endpoint. This will be used by the kube-rbac-proxy sidecar.
          default: localhost
        auth_proxy_port:
          type: integer
          description: The external port address of the of the kube-rbac-proxy sidecar
          default: 8443
        auth_proxy_host:
          type: string
          description: The binding ip address of the kube-rbac-proxy sidecar
          default: 0.0.0.0
        use_cert_manager:
          type: string
          description: Cert manager is required to be installed to use this flag. When true, this creates certificates object to be signed by cert manager for the API server and Postgres database. If false, the certificate object have to be provided by the user.
          default: "true"
        storage_class_name:
          type: string
          description: The storage class name of the persistent volume used by Postgres database for storing data. The default value will use the default class name defined on the cluster.
          default: ""
        database_request_storage:
          type: string
          description: The storage requested of the persistent volume used by Postgres database for storing data.
          default: 10Gi
        pg_req_memory:
          type: string
          description: Memory request for postgres container in metadata-store-db deployment
          default: 1Gi
        pg_limit_memory:
          type: string
          description: Memory limit for postgres container in metadata-store-db deployment
          default: 4Gi
        app_req_memory:
          type: string
          description: Memory request for metadata-store-app container
          default: 128Mi
        app_req_cpu:
          type: string
          description: CPU request for metadata-store-app container
          default: 100m
        app_limit_memory:
          type: string
          description: Memory limit for metadata-store-app container
          default: 512Mi
        app_limit_cpu:
          type: string
          description: CPU limit for metadata-store-app container
          default: 250m
        app_replicas:
          type: integer
          description: The number of replicas for the metadata-store-app
          default: 1
        db_replicas:
          type: integer
          description: The number of replicas for the metadata-store-db
          default: 1
        priority_class_name:
          type: string
          description: If specified, this value is the name of the desired PriorityClass for the metadata-store-db deployment
          default: ""
        add_default_rw_service_account:
          type: string
          description: Adds a read-write service account which can be used to obtain access token to use metadata-store CLI
          default: "true"
        ns_for_export_app_cert:
          type: string
          description: The namespace where the "Supply Chain Security Tools for VMware Tanzu - Scan" component is installed in. Certain certificates will be exported to that namespace so that scan reports can be posted to the Metadata Store.
          default: scan-link-system
        log_level:
          type: string
          description: Sets the log level. This can be set to "minimum", "less", "default", "more", "debug" or "trace". "minimum" currently does not output logs. "less" outputs log configuration options only. "default" and "more" outputs API endpoint access information. "debug" and "trade" outputs extended API endpoint access information(such as body payload) and other debug information.
          default: default
          examples:
          - minimum
          - less
          - default
          - more
          - debug
          - trace
  template:
    spec:
      fetch:
      - imgpkgBundle:
          image: dev.registry.tanzu.vmware.com/supply-chain-security-tools/insight-metadata-store-bundle@sha256:0e169d8d11a0392e064ab947af4a30c20b11455cebac9753fb6eb733ab07fc0e
      template:
      - ytt:
          ignoreUnknownComments: true
          paths:
          - deployment/
      - kbld:
          paths:
          - '-'
          - .imgpkg/images.yml
      deploy:
      - kapp: {}
---
apiVersion: data.packaging.carvel.dev/v1alpha1
kind: PackageMetadata
metadata:
  name: image-policy-webhook.signing.apps.tanzu.vmware.com
spec:
  categories:
  - policy
  displayName: Image Policy Webhook
  longDescription: The Image Policy Webhook allows platform operators to define a
    policy that will restrict unsigned images on a Kubernetes cluster. This component
    contains logic to communicate with external registries and verify signatures on
    container images, making a decision based on the results of this verification.
    Currently, this component supports cosign signatures and its key formats.
  maintainers:
  - name: Adam Dawson
  - name: Adam Shamblin
  - name: Andrés Torres
  - name: Denny Hoang
  - name: Der Wei Chan
  - name: Jackline Mutua
  - name: Kavitha Krishnan
  - name: Mauren Berti
  - name: Robert Szumlakowski
  providerName: VMware
  shortDescription: Image Policy Webhook enables defining of a policy to restrict
    unsigned container images.
  supportDescription: https://tanzu.vmware.com/support
---
apiVersion: data.packaging.carvel.dev/v1alpha1
kind: Package
metadata:
  name: image-policy-webhook.signing.apps.tanzu.vmware.com.1.0.0
spec:
  refName: image-policy-webhook.signing.apps.tanzu.vmware.com
  version: 1.0.0
  releaseNotes: |
    Supply Chain Security Tools - Sign v1.0.0
    - BREAKING CHANGE: ClusterImagePolicy group has been renamed to signing.apps.tanzu.vmware.com.
    - BREAKING CHANGE: Dropped support for API version v1alpha1. Use v1beta1.
  releasedAt: 2021-12-21T14:00:00Z
  template:
    spec:
      fetch:
      - imgpkgBundle:
          image: dev.registry.tanzu.vmware.com/supply-chain-security-tools/image-policy-webhook-bundle@sha256:12c36c6050f469daea4194e22b90621dc2f27fdcfc925bc9f014d67d78304112
      template:
      - ytt:
          paths:
          - config/
      - kbld:
          paths:
          - '-'
          - .imgpkg/images.yml
      deploy:
      - kapp: {}
  valuesSchema:
    openAPIv3:
      title: image-policy-webhook.signing.apps.tanzu.vmware.com.1.0.0 values schema
      examples:
      - allow_unmatched_images: true
      properties:
        allow_unmatched_images:
          type: boolean
          description: |
            Feature flag for enabling admission of images that do not match any patterns in the image policy configuration.
            Set to true to allow images that do not match any patterns into the cluster with a warning.
          default: false
          examples:
          - true
        quota:
          type: object
          description: |
            Contains configuration for ResourceQuotas.
          properties:
            pod_number:
              type: string
              description: |
                The maximum number of Image Policy Webhook Pods allowed to be created with the priority class
                system-cluster-critical. This value must be enclosed in quotes ("").
                If this value is not specified then a default value of 5 is used.
              default: "5"
              examples:
