          properties:
            enable:
              type: boolean
              description: "Optional: Set to true to enable Pod Disruption Budget. If provider local is set to \"local\", the PDB will be disabled automatically."
              default: true
        domain_template:
          type: string
          description: "Optional: Specifies the golang text template string to use when constructing the Knative service's DNS name."
          default: "{{.Name}}.{{.Namespace}}.{{.Domain}}"
  template:
    spec:
