---
apiVersion: data.packaging.carvel.dev/v1alpha1
kind: PackageMetadata
metadata:
  name: api-portal.tanzu.vmware.com
spec:
  displayName: API portal
  longDescription: |-
    API portal promotes collaboration across different lines of business teams.
    The API service provider exposes the API endpoints by adding the OpenAPI URL into the API portal deployment and document the API endpoints in the OpenAPI format in the portal.
    The API consumer therefore can discover the API endpoints and further try out the endpoints and receive sample responses in the portal.
  shortDescription: A unified user interface to enable search, discovery and try-out of API endpoints at ease.
  categories: []
  providerName: VMware
  iconSVGBase64: 
  maintainers:
  - name: VMware
  supportDescription: https://tanzu.vmware.com/support
---
apiVersion: data.packaging.carvel.dev/v1alpha1
kind: Package
metadata:
  name: api-portal.tanzu.vmware.com.1.0.8
spec:
  refName: api-portal.tanzu.vmware.com
  version: 1.0.8
  releasedAt: "2021-12-16T00:00:00Z"
  releaseNotes: |
    Resolved the CVE issues; recommend upgrade from the previous versions
  valuesSchema:
    openAPIv3:
      title: api-portal.tanzu.vmware.com values schema
      examples: []
      properties:
        apiPortalServer:
          type: object
          description: API portal server configurations
          properties:
            replicaCount:
              type: integer
              description: Number of replicas
              default: 1
            title:
              type: string
              description: Title of the API portal instance
              default: API portal
            description:
              type: string
              description: Description of the API portal instance
              default: API portal for <namespace> namespace
            sourceUrls:
              type: string
              description: OpenAPI urls to load
              default: https://petstore.swagger.io/v2/swagger.json,https://petstore3.swagger.io/api/v3/openapi.json
            sourceUrlsCacheTtlSec:
              type: string
              description: Time after which they will be refreshed (in seconds)
              default: "300"
            sourceUrlsTimeoutSec:
              type: string
              description: Timeout for remote OpenAPI retrieval (in seconds)
              default: "10"
            requestMemory:
              type: string
              description: Requests describes the minimum amount of memory resources required.
              default: 512Mi
            requestCpu:
              type: string
              description: Requests describes the minimum amount of cpu resources required.
              default: 100m
            limitMemory:
              type: string
              description: Limits describes the maximum amount of memory resources allowed.
              default: 1024Mi
            limitCpu:
              type: string
              description: Limits describes the maximum amount of cpu resources allowed.
              default: 500m
            namespace:
              type: string
              description: The namespace to deploy API portal to
              default: api-portal
            sso:
              type: object
              description: SSO Configuration
              properties:
                secret:
                  type: string
                  description: Secret name to search in the namespace which contains "scope", "issuer-uri", "client-id" and "client-secret"
                  default: sso-credentials
  licenses:
  - VMware Proprietary
  template:
    spec:
      fetch:
      - imgpkgBundle:
          image: dev.registry.tanzu.vmware.com/api-portal/api-portal-carvel-package:1.0.8
      template:
      - ytt:
          paths:
          - config/
          - values.yaml
      - kbld:
          paths:
          - '-'
          - .imgpkg/images.yml
      deploy:
      - kapp: {}
