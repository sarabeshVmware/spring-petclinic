apiVersion: data.packaging.carvel.dev/v1alpha1
kind: PackageMetadata
metadata:
  name: accelerator.apps.tanzu.vmware.com
spec:
  displayName: "Application Accelerator for VMware Tanzu"
  longDescription: "Application Accelerator is used to create new projects and configurations which follow enterprise standards."
  shortDescription: "Used to create new projects and configurations."
  providerName: "VMware"
  maintainers:
  - name: "Thomas Risberg"
  - name: "Diego Wong"
  supportDescription: "Support available from VMware. Refer to the VMware Product Guide for specific support terms."
---
apiVersion: data.packaging.carvel.dev/v1alpha1
kind: Package
metadata:
  name: accelerator.apps.tanzu.vmware.com.1.1.0-build.2
spec:
  refName: accelerator.apps.tanzu.vmware.com
  version: 1.1.0-build.2
  releasedAt: 2022-03-03T00:00:00Z
  releaseNotes: |
        Release 1.1.0-build.2 of the Application Accelerator for VMware Tanzu package
  valuesSchema:
    openAPIv3:
      title: accelerator.apps.tanzu.vmware.com values schema
      properties:
        server:
          description: 'UI Server Configuration'
          properties:
            service_type:
              type: string
              description: The service type for the acc-server service.
              default: LoadBalancer
              examples:
              - NodePort
            watched_namespace:
              type: string
              description: The namespace that the server watches for accelerator resources.
              default: default
            engine_invocation_url:
              type: string
              description: The URL the server uses for invoking the accelerator engine.
              default: "http://acc-engine.accelerator-system.svc.cluster.local/invocations"
          type: object
        engine:
          description: 'Accelerator Engine Configuration'
          properties:
            service_type:
              type: string
              description: The service type for the Service of the engine.
              default: ClusterIP
              examples:
              - NodePort
            max_direct_memory_size:
              type: string
              description: The max size for the Java -XX:MaxDirectMemorySize setting.
              default: 32M
              examples:
              - 64M
          type: object
        samples:
          description: 'Sample Configuration'
          properties:
            include:
              type: boolean
              description: Whether to include the bundled sample Accelerators in the install.
              default: true
          type: object
        ingress:
          description: 'Ingress Configuration'
          properties:
            include:
              type: boolean
              description: Whether to include the ingress configuration in the install.
              default: false
          type: object
        domain:
          description: 'Top level domain to use for ingress configuration'
          default: tap.example.com
          type: string
        tls:
          description: 'TLS Secret Configuration'
          properties:
            secretName:
              type: string
              description: The name of the secret.
              default: tls
            namespace:
              type: string
              description: The namespace for the secret.
              default: tanzu-system-ingress
          type: object
  template:
    spec:
      fetch:
      - imgpkgBundle:
          image: dev.registry.tanzu.vmware.com/app-accelerator/acc-install-bundle@sha256:b918aa75d09174507b09fb2248bfbda8b204c5acc10cd28eda3cbbbb3b358643
      template:
      - ytt:
          paths:
          - "config"
          - "values.yml"
      - kbld:
          paths:
          - "-"
          - ".imgpkg/images.yml"
      deploy:
      - kapp: {}
