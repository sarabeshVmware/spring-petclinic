namespace: tap-install
secrets:
  - name: tanzunet-creds
    registry: registry.tanzu.vmware.com
    username: # TANZUNET_USERNAME
    password: # TANZUNET_PASSWORD
    namespace: tap-install
  - name: registry-credentials
    registry: # REGISTRY_SERVER
    username: # REGISTRY_USERNAME
    password: # REGISTRY_PASSWORD
    namespace: tap-install
package_repository:
  name: tanzu-tap-repository
  image: registry.tanzu.vmware.com/tanzu-application-platform/tap-packages:0.2.0
packages:
  ## INDEPENDENT PACKAGES:
  - name: accelerator.apps.tanzu.vmware.com
    installed_name: app-accelerator
    version: 0.3.0
    use_values_file: app-accelerator.yaml
  - name: cnrs.tanzu.vmware.com
    installed_name: cloud-native-runtimes
    version: 1.0.2
    use_values_file: cloud-native-runtimes.yaml
  - name: controller.source.apps.tanzu.vmware.com
    installed_name: source-controller
    version: 0.1.2
  - name: buildservice.tanzu.vmware.com
    installed_name: tanzu-build-service
    version: 1.3.0
    use_values_file: tanzu-build-service.yaml

  # ## DEPENDENT PACKAGES:
  # ### app-live-view requires convention-controller; developer-conventions requires app-live-view
  - name: controller.conventions.apps.tanzu.vmware.com
    installed_name: convention-controller
    version: 0.4.2
  - name: appliveview.tanzu.vmware.com
    installed_name: app-live-view
    version: 0.2.0
    use_values_file: app-live-view.yaml
  - name: developer-conventions.tanzu.vmware.com
    installed_name: developer-conventions
    version: 0.2.0
  # ### default-supply-chain-testing requires cartographer; default-supply-chain requires cartographer
  # ### NOTE: install only one of default-supply-chain-testing and default-supply-chain
  - name: cartographer.tanzu.vmware.com
    installed_name: cartographer
    version: 0.0.6
  - name: default-supply-chain.tanzu.vmware.com
    installed_name: default-supply-chain
    version: 0.2.0
    use_values_file: default-supply-chain.yaml
