    server: <SERVER>
    repository: <REPOSITORY>
  gitops:
    ssh_secret: ""
grype:
  namespace: "tap-install"
  targetImagePullSecret: registry-credentials
contour:
  #infrastructure_provider: vsphere
  envoy:
    service:
      type: LoadBalancer
