apiVersion: carto.run/v1alpha1
kind: Workload
metadata:
  name: nodejs-angular-app
  labels:
    apps.kubernetes.io/name: nodejs-angular-app
    app.kubernetes.io/part-of: nodejs-angular-app
    apps.tanzu.vmware.com/workload-type: web
    apps.tanzu.vmware.com/has-tests: true
spec:
  source:
    git:
      url: https://github.com/dapdelivery/test-buildpack-nodejs-angular.git
      ref:
        branch: main
  resources:
    requests:
      memory: 1Gi
      cpu: 100m
    limits:
      memory: 1Gi
      cpu: 4000m
